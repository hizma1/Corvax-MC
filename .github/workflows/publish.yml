name: Publish

concurrency:
  group: publish
  cancel-in-progress: true

on:
  workflow_dispatch:
#  push:
#    branches:
#      - master
#      - patogen-master

jobs:
  build:
    runs-on: self-hosted
    environment: ${{ github.ref_name == 'master' && 'production' || 'mapper' }}

    steps:
    - name: Fail if we are attempting to run on the master branch of upstream
      if: ${{ github.ref_name == 'master' && github.repository == 'space-wizards/space-station-14' }}
      run: exit 1

    - name: Install dependencies
      run: sudo apt-get install -y python3-paramiko python3-lxml

    - uses: actions/checkout@v4.2.2
      with:
        submodules: 'recursive'

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 9.0.x
      env:
        DOTNET_INSTALL_DIR: ${{ runner.temp }}/.dotnet

    - name: Set DOTNET_ROOT and PATH
      run: |
        echo "DOTNET_ROOT=${{ runner.temp }}/.dotnet" >> $GITHUB_ENV
        echo "${{ runner.temp }}/.dotnet" >> $GITHUB_PATH

    - name: Check .NET
      run: dotnet --info

    - name: Get Engine Tag
      run: |
        cd RobustToolbox
        git fetch --depth=1

    - name: Restore
      run: dotnet restore

    - name: Build Packaging
      run: dotnet build Content.Packaging --configuration Release --no-restore /m

    - name: Package server
      run: dotnet run --project Content.Packaging server --platform win-x64 --platform linux-x64 --platform osx-x64 --platform linux-arm64 -c Release /p:PublishTrimmed=false
      env:
        DOTNET_PublishTrimmed: false
        DOTNET_EnableTrimAnalyzer: false

    - name: Package client
      run: dotnet run --project Content.Packaging client --no-wipe-release

    # --- Исправленный шаг определения форка ---
    - name: Determine Fork
      run: echo "FORK_ID=${{ github.ref_name == 'master' && 'colonialmarines' || 'colonialmarines-pathogen' }}" >> $GITHUB_ENV

    # --- Публикация с явной передачей форка в скрипт ---
    - name: Publish version
      run: python3 Tools/publish_multi_request.py --fork-id ${{ env.FORK_ID }}
      env:
        PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        GITHUB_REPOSITORY: ${{ github.repository }}

    - name: Publish changelog (Discord)
      continue-on-error: true
      run: Tools/actions_changelogs_since_last_run.py
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DISCORD_WEBHOOK_URL: ${{ secrets.CHANGELOG_DISCORD_WEBHOOK }}
