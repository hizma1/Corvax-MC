name: RSI Validator

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    paths:
      - '**.rsi/**'

jobs:
  validate_rsis:
    name: Validate RSIs
    runs-on:  self-hosted
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Setup Submodule
        run: git submodule update --init
      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5
      - name: Install Python dependencies
        run: |
          python3 -m venv venv
          ./venv/bin/pip install pillow jsonschema
      - name: Validate RSIs
        run: |
          ./venv/bin/python3 RobustToolbox/Schemas/validate_rsis.py Resources/
