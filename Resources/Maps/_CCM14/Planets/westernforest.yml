    - type: Paper
      content: >+
        [italic]"Рядом кружат ксеноморфы.

        Тихо шепчут пулеметы.

        И десант морской пехоты

        Летит на эриду для охоты.


        А я повыше закатаю рукава,

        И весь улей раскидаю на дрова.

        Я буду жечь и убивать.

        И мне на совесть наплевать.


        Они кричат: "Не бухать!"

        И предлагают нам тюрьму.

        Всё это - горе полицаи.

        А я садист из дельты.


        А я повыше закатаю рукава,

        И весь улей раскидаю на дрова.

        Я буду жечь и убивать.

        И мне на совесть наплевать.


        А я берет на лоб надвину.

        И автомат повыше вскину.

        И я с улыбкою веселой

        Буду жечь чужие сёла.


        А я повыше закатаю рукава,

        И весь улей раскидаю на дрова.

        Я буду жечь и убивать.

        И мне на совесть наплевать.


        А я не то еще видал.

        Берет зеленый высоко кидал.

        Мне всеравно - что там, что здесь.

        И все равно, где в землю лечь


        А я повыше закатаю рукава,

        И весь улей раскидаю на дрова.

        Я буду жечь и убивать.

        И мне на совесть наплевать.


        А я повыше закатаю рукава,

        И весь улей раскидаю на дрова.

        Я буду жечь и убивать.

        И мне на совесть наплевать,

        Наплевать."[/italic]


        [color=blue]- Deleted User

        #0000[/color]


        (Взято из канала "медиа" в дискорде)




        [bold]Erida[/bold] - одна из лучших (если не самая лучшая) карт во времена правления Демура. Мы любили Эриду за простоту и линейность. На ней было очень легко играть, не нужно было долго искать диск или бомбу, просто иди вперед и все. 


        Создатель Эриды - FraG. Мы никогда не забудем его имя и имена тех, кто участвовал в маппинге такой хорошей карты.




        Западная часть карты - дань уважения к нашей любимой Эриде. Мы хотим, чтобы даже ньюфаги знали о таких крутых картах. 







