- proto: BookBase
  entities:
  - uid: 470
    components:
    - type: MetaData
      name: Ребаланс, как выучить Луа и не ахуеть
    - type: Transform
      parent: 469
    - type: Paper
      content: >
        Книга повествует историю о программисте что пытается выучить язык программирование Луа чтобы как то сделать свою игру лучше. По итогу он ахуевает от этого языка программирования и не хочет его учить для своей игры, пытаясь иными способами как то улучшить свою игру.
    - type: Physics
      canCollide: False
- proto: BookRandom
  entities:
  - uid: 471
    components:
    - type: MetaData
      name: Европа
    - type: Transform
      parent: 469
    - type: Paper
      content: >
        Книга рассказывает историю про спутник Европы, в чьих водах человечество выживают каждый день и находят время чтобы бороться между собой. В ней главный герой является капитаном своей подводной лодки, что собирает команду для путешествия в самый центр вод Европы. В конце рассказа команда главного героя сражаются с *остальные листы полностью нечитаемые, из-за большого количества водных марок: "G2.10".
    - type: Physics
      canCollide: False
  - uid: 473
    components:
    - type: MetaData
      name: 'Бронированое ядро: Последний мех-воин.'
    - type: Transform
      parent: 472
    - type: Paper
      content: >
        Книга повествует об пилоте мех-воина, выполняющие заказы от различных корпораций, где мир был погружен а хаус и опустошение. В конце он из последних сил отбивается от орд дронов, но у него не получается и он умирает.
    - type: Physics
      canCollide: False
  - uid: 474
    components:
    - type: MetaData
      name: Евольв
    - type: Transform
      parent: 472
    - type: Paper
      content: >
        Книга рассказывающее об монстрах неизвестной планеты Евольв, над которыми проводили опыты и различные опыты. В конце планету и научный комплекс объявляют потерянными, так как эти сверх монстры вышли из под контроля и перебили 99% персонала.
    - type: Physics
      canCollide: False
  - uid: 476
    components:
    - type: MetaData
      name: Мета-Отсылка
    - type: Transform
      parent: 475
    - type: Paper
      content: >
        Псевдо научная книга рассказывающая об явлении "Мета-Отсылка", из-за которого в мире происходит "Мета-разломы" и "Мета-наказания". В конце автор утверждает что его ищет "Мета-полиция" за нарушения "Мета-навыка", ведь его роль в этом мире не позволяет писать данные произведения.
    - type: Physics
      canCollide: False
  - uid: 477
    components:
    - type: MetaData
      name: Чужой, дробовик и ты.
    - type: Transform
      parent: 475
    - type: Paper
      content: >
        "Чужой, дробовик и ты" - ДжоРей


        Чужой, дробовик и ты

        У меня есть чужой и дробовик

        И я приведу их к тебе домой


        Пикап, блюспейс и ты

        У меня есть пикап и блюспейс 

        И я приведу их к тебе домой


        Лопата, ведро и ты

        У меня есть лопата и ведро

        И я принесу их тебе домой


        Ботинки, носки и ты

        У меня есть ботинки и носки

        И я принесу их тебе домой


        Блюспейс , пикап, лопата, ведро, ботинки, носки, сальса, чипсы,

        виски, кока-кола, конфеты, цветы, надгробие, могила

        У меня есть чужой и дробовик

        И я привезу их тебе домой.


        Тогда хватай своего чужого и бей его по голове

        Если он не любит печенье, корми его кукурузным хлебом

        Чужие, напившись, бросаются на людей, как собака на кость, как собака на кость...

        Через секунду они станут украшением уличных улиц, Уличный роллерщик!


        Привет

        Скидывай ботинки

        Останься ненадолго

        Снимай пальто

        Сними носки

        Повесь шапку повыше

        Принесу тебе что-нибудь поесть

        Я заеду за тобой в следующий раз.
    - type: Physics
      canCollide: False
  - uid: 479
    components:
    - type: MetaData
      name: 'КМ: начало военной организации'
    - type: Transform
      parent: 478
    - type: Paper
      content: >
        Данная книга повествует о создании военных сил колониальных морпехов, что были созданы для защиты окраинных секторов ОПЗ. В конце рассказывается о нынешних делах ОПЗ и ситуации с ксеносами "чужими", также упоминается понижения бюджета всей колониального корпуса.
    - type: Physics
      canCollide: False
  - uid: 480
    components:
    - type: MetaData
      name: Человек продавший муху
    - type: Transform
      parent: 478
    - type: Paper
      content: >
        Произведение рассказывает историю становления известного морпеха с позывным "Муха", что ловко прятался от ксеносов "чужих" и атаковал их из подтяжка. В конце рассказывается о его уходе из колониального корпуса, решивший основать ЧВК "Алмазные мухи".
    - type: Physics
      canCollide: False
