- type: entity
  id: CCMVehicleSelectHardpointAction
  name: Weapon Mount Control
  description: Open the vehicle’s weapon mount interface to manage installed weapons and modules.
  categories:
  - HideSpawnMenu
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _CCM14/Actions/vehicle_actions.rsi
      state: chamber_swap
    useDelay: 1
  - type: InstantAction
    event: !type:VehicleSelectHardpointEvent

- type: entity
  id: CCMVehicleVehicleStatusAction
  name: Vehicle Status
  description: View hull integrity, systems status, and onboard crew conditions.
  categories:
  - HideSpawnMenu
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _CCM14/Actions/vehicle_actions.rsi
      state: vehicle_status
    useDelay: 1
  - type: InstantAction
    event: !type:VehicleStatusMenuEvent

- type: entity
  id: CCMVehicleLockDoorsAction
  name: Lock Doors
  description: Lock the vehicle’s doors.
  categories:
  - HideSpawnMenu
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _CCM14/Actions/vehicle_actions.rsi
      state: door_unlocked
    useDelay: 1
  - type: InstantAction
    event: !type:VehicleLockDoorsEvent

- type: entity
  id: CCMVehicleReloadSpecialAction
  name: Reload M56 FPW
  description: "Reloads M56 FPW machine guns. Automatically reloads when ammo is depleted or when this action is used. Reload time: 10 seconds."
  categories:
  - HideSpawnMenu
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _CCM14/Actions/vehicle_actions.rsi
      state: chamber_swap
    useDelay: 1
  - type: InstantAction
    event: !type:VehicleReloadSpecialGunEvent