- type: entity
  id: RMCPlanetChancesPolyphemus
  name: Polyphemus
  components:
  - type: RMCPlanetMapPrototype
    map: /Maps/_CCM14/Planets/polyphemus.yml
    camouflage: Classic
    survivorJobs:
    - CMSurvivor: 3
    - CMSurvivorCorporate: 1
    - CMSurvivorDoctor: 2
    - CMSurvivorEngineer: 2
    - CMSurvivorSecurity: 2
    - CMSurvivorScientist: 1
    announcement: "От аванпоста ООН «Полифем» получен автоматический сигнал бедствия. В ближайшее время для расследования будет отправлена группа реагирования с корабля UNS David.
      Назначение: исследовательская станция и горнодобывающее предприятие.

      Население: 48 человек.
      Текущая температура: 15 °C внутри, ERROR°C снаружи.
      Командир аванпоста: представитель ООН Стив Хайфиш.
      Телекоммуникационная система: требуется ремонт.
      Биосканирование: Unknown error

      Эта трансляция будет повторяться каждые 24 часа.

      На данный момент дополнительная информация отсутствует." #ccm-planet-announcement-polyphemus

