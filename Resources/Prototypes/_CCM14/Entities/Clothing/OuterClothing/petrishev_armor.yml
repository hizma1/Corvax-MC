- type: entity
  parent: CCMArmorREV
  id: CCMArmorREVHeavy
  name: OPLOT-K pattern bomb suit
  description: An extremely heavy-duty set of body armor in service with the Petrishev Revolutionaries. It looks like a heavily modified UM5, no doubt it can take a good hit from an GL and keep wearer alive, just like the Petrishevtsi loves.
  components:
  - type: Sprite
    sprite: _CCM14/Objects/Clothing/OuterClothing/Armor/Petrishev/engineer.rsi
  - type: RMCArmorSpeedTier
    speedTier: heavy
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_HEAVY
    walkModifier: 0.57
    sprintModifier: 0.57
  - type: CMArmor
    melee: 25 # CLOTHING_ARMOR_MEDIUMHIGH (melee)
    bullet: 35 # CLOTHING_ARMOR_HIGHPLUS (bullets)
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 35 # CLOTHING_ARMOR_HIGH
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

