- type: entity
  parent: CMArmorM3Medium
  id: CCMArmorREV
  name: UNION pattern armor
  description: Standard body armor of the Petrishev Revolutionary. This one looks like an UM5 armor of USSP, but slightly modified. Comes with a strapped carbon-reinforced kama with a radical red line.
  components:
  - type: Sprite
    sprite: _CCM14/Objects/Clothing/OuterClothing/Armor/Petrishev/soldat.rsi
  - type: CMArmor
    bullet: 30 # CLOTHING_ARMOR_HIGH
    bio: 15 # CLOTHING_ARMOR_MEDIUMLOW
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_MEDIUM
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Storage
    grid:
    - 0,0,1,1 # 1 slot
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: rmc-armor-not-rev-jumpsuit
    whitelist:
      tags:
      - CCMJumpsuitRevolutionary

- type: entity
  parent: CCMArmorREV
  id: CCMArmorREVSoldat


