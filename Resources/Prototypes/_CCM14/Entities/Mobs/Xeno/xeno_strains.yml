    offsetLength: 3
    speed: 0.8
    doAfter: 0.5
  - type: XenoEvolution
    max: 500
    evolvesTo:
    - CMXenoBoiler
    - CMXenoPraetorian
    strains: []
  - type: MobThresholds
    thresholds:
      0: Alive
      400: Critical
      500: Dead
  - type: XenoHidden
