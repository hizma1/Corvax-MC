# // CCM Xeno Strain - Boxer Warrior
- type: entity
  parent: CMXenoWarrior
  id: CCMXenoWarriorBoxer
  suffix: Boxer
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Warrior/boxer.rsi
  - type: XenoStrain
    name: ccm-xeno-boxer-name
    description: ccm-xeno-boxer-description
    popup: ccm-xeno-boxer-popup
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoPunch
    - CCMActionXenoBoxerAdvance
    - CCMActionXenoBoxerWidePunch
    - CCMActionXenoBoxerTailKnock
    - ActionXenoDevolve
  - type: XenoLeap
    delay: 0
    range: 2
    moveDelayTime: 0
    knockdownTime: 0
    leapSound: /Audio/_RMC14/Xeno/alien_claw_block.ogg
    hitEffect: CMEffectPunch
    targetJitterTime: 1
    targetCameraShakeStrength: 1
    damage:
      groups:
        Brute: 25
  - type: XenoPunch
    damage:
      types:
        Blunt: 35
  - type: XenoTailSweep
    plasmaCost: 0
    paralyzeTime: 0
    damage:
      types:
        Slash: 35
  - type: XenoScissorCut
    range: 1
    attackEffect: RMCEffectSlam
    telegraphEffectEdge: RMCEffectXenoTelegraphRed
    damage:
      types:
        Slash: 30
    slashSound:
        collection: Punch
        params:
          variation: 0.15
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: CCMWeaponArcXenoPunch
    attackRate: 1.4
    damage:
      groups:
        Brute: 25
  - type: XenoEvolution
    max: 500
    evolvesTo:
    - RMCXenoCrusher
    - CMXenoPraetorian
    strains: []
  - type: XenoHidden
  - type: XenoLifesteal
    maxHeal: 80
    minHeal: 40

# // CCM Xeno Punch Attack Effect
- type: entity
  parent: [WeaponArcClaw, RMCBaseEffect]
  id: CCMWeaponArcXenoPunch
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 0.4
  - type: Sprite
    sprite: _RMC14/Effects/attacks.rsi
    state: punch
    noRot: true
# // CCM Xeno Punch Attack Effect
# // CCM Xeno Strain - Boxer Warrior

# // CCM Xeno Strain - Melee & Ranger Sentinels
- type: entity
  parent: CMXenoSentinel
  id: CCMXenoMeleeSentinel
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Sentinel/melee.rsi
  - type: XenoStrain
    name: ccm-xeno-meleesent-name
    description: ccm-xeno-meleesent-description
    popup: ccm-xeno-meleesent-popup
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoAcidWeak
    - ActionXenoPunch
    - CCMActionXenoLightNeuroEmpower
    - CCMActionXenoGreaterParalyzingSlash
    - ActionXenoDevolve
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 27.5
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 35
  - type: XenoPunch
    range: 3
    damage:
      types:
        Blunt: 27.5
  - type: XenoParalyzingSlash
    stunDelay: 1
    stunDuration: 2
  - type: XenoCripplingStrike
    activateText: rmc-xeno-apprehend-activate
    deactivateText: rmc-xeno-apprehend-deactivate
    expireText: rmc-xeno-apprehend-expire
    removeOnHit: true
    preventTackle: true
    resetMeleeCooldown: true
    auraColor: "#9ACD32FF"
    damageMult: 1
    speed: 1.2
  - type: CMArmor
    xenoArmor: 15
    explosionArmor: 35
  - type: XenoEvolution
    canEvolveWithoutGranter: true
    max: 200
    evolvesTo:
    - CMXenoSpitter
    evolvesToWithoutPoints:
    - CMXenoQueen
    strains: []
  - type: XenoHidden

- type: entity
  parent: CMXenoSentinel
  id: CCMXenoRangerSentinel
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Sentinel/ranger.rsi
  - type: XenoStrain
    name: ccm-xeno-rangersent-name
    description: ccm-xeno-rangersent-description
    popup: ccm-xeno-rangersent-popup
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoAcidWeak
    - ActionXenoSlowingSpit
    - ActionXenoScatteredSpit
    - ActionXenoSprayAcid
    - ActionXenoDevolve
  - type: XenoSlowingSpit
    projectileId: CCMXenoGreatSlowingSpitProjectile
  - type: XenoScatteredSpit
    maxDeviation: 60
    maxProjectiles: 12
    projectileId: CCMXenoGreatScatteredSpitProjectile
  - type: XenoSprayAcid
    acid: CCMXenoAcidSprayRanger
    barricadeDamage:
      types:
        Heat: 5
  - type: XenoEvolution
    canEvolveWithoutGranter: true
    max: 200
    evolvesTo:
    - CMXenoSpitter
    evolvesToWithoutPoints:
    - CMXenoQueen
    strains: []
  - type: MobThresholds
    thresholds:
      0: Alive
      380: Critical
      480: Dead
  - type: XenoHidden
# // CCM Xeno Strain - Melee & Ranger Sentinels

# // CCM Xeno Strain - Sniper Spitter
- type: entity
  parent: CMXenoSpitter
  id: CCMXenoSniperSpitter
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Spitter/sniper.rsi
  - type: XenoStrain
    name: ccm-xeno-sniper-name
    description: ccm-xeno-sniper-description
    popup: ccm-xeno-sniper-popup
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStabCorrosive
    - ActionXenoAcidNormal
    - CCMActionXenoSniperSnipe
    - ActionXenoZoom
    - ActionXenoSprayAcid
    - CCMActionXenoSniperWalker
    - ActionXenoDevolve
  - type: XenoSpit
    plasmaCost: 300
    projectileId: CCMXenoSniperSpitProjectile
    speed: 33
  - type: XenoResinWalker
    plasmaCost: 100
    speedMultiplier: 5
  - type: XenoSprayAcid
