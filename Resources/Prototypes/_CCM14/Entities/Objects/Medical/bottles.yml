- type: entity
  parent: CMBottleFilled
  id: CCMBottleTramadol
  suffix: CCM
  name: tramadol bottle
  description: A small bottle. Contains Tramadol - Used to treat pain.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 60
        reagents:
        - ReagentId: CMUTramadol
          Quantity: 60
  - type: CMRefillableSolution
    reagents:
      CMUTramadol: 60

