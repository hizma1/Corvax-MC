  name: tramadol pill bottle
  description: It's an airtight container for storing medication. It's labeled "Tramadol(15u, 2 pill OD) An anti-pain medicine. It supress moderate pain."
  suffix: CCM, Tramadol, 16, No Skill
  components:
  - type: Item
    heldPrefix: 5
  - type: Sprite
    layers:
    - state: pill_canister5
      map: [ "bottleSurfaceLayer" ]
    - state: open
      map: [ "openLayer" ]
