# Pill Packets

- type: entity
  parent: CMPacketPills
  id: CCMPacketPillsTramadol
  name: tramadol pill packet
  description: This packet contains tramadol pills. Moderate supresses pain. Once you take them out, they don't go back in. Don't take more than 2 pills in a short period.
  components:
  - type: Sprite
    state: tramadol_packet
  - type: StorageFill
    contents:
    - id: CCMPillTramadol
      amount: 4
  - type: IconLabel
    labelTextLocId: Tr

# Pill Canisters

