- type: entity
  parent: CCMMarineVehicleGunAttachableBase
  name: ARS-159 Boyars Dualcannon
  id: CCMMarineVehicleDualcannon
  description: A primary two-barrel cannon for the APC that shoots 20mm IFF-compatible rounds.
  components:
  - type: Sprite
    sprite: _CCM14/Objects/Vehicles/base_apc_items.rsi
    layers:
    - map: [ "enum.VehicleAttachableVisualLayers.Base" ]
      state: dual_cannon
  - type: VehicleAttachable
    hardpointType: HDPT_PRIMARY
    damageMult: 0.2
    skill: RMCSkillEngineer
    level: 2
    maxHealth: 500
    offset: 0.8, 1.15
  - type: VehicleAttachableVisuals
    rsi: _CCM14/Mobs/Vehicles/base_apc.rsi
    state: dualcannon
    destroyedState: dualcannon_destroyed
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Gun
    fireRate: 3.333333333
    selectedMode: FullAuto
    availableModes:
      - FullAuto
    soundGunshot:
      path: /Audio/_CCM14/dual_autocannon_fire.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
    cameraRecoilScalarModified: 0
    cameraRecoilScalar: 0
  - type: VehicleGun
    maxSpareMagazines: 2
    acceptedMagazineTypes: ["boyars_dualcannon"]
    startingMagazinePrototype: CCMVehicleAmmoBoyarsDualcannon
  - type: GunArcRestriction
    maxAngleDeviation: 30

- type: entity
