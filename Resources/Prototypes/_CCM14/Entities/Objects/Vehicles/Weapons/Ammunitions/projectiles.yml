- type: entity
  parent: CMBulletBase
  id: CMBulletTankDualcannon
  name: dualcannon bullet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Projectiles/bullet_projectiles.rsi
    layers:
    - state: bullet
      shader: unshaded
  - type: Projectile
    damage:
      types:
        Piercing: 50
  - type: CMArmorPiercing
    amount: 15
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 0
      falloff: 1
      ignoreModifiers: false
    - range: 10
      falloff: 9999
      ignoreModifiers: true
  - type: RMCProjectileAccuracy
    accuracy: 98
    thresholds:
    - range: 10
      falloff: 10
  - type: ProjectileMaxRange
    max: 12
  - type: ShakeOnHit

