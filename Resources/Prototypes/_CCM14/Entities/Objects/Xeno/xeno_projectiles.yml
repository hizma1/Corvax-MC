- type: entity
  id: CCMXenoGreatSlowingSpitProjectile
  parent: XenoBaseProjectile
  name: greater slowing spit
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: neurotoxin
      shader: unshaded
  - type: XenoSlowingSpitProjectile
    armorResistsKnockdown: true
  - type: XenoProjectile
    deleteOnFriendlyXeno: true
  - type: DrainOnHit
  - type: ProjectileMaxRange
    max: 8
  - type: Projectile
    impactEffect: XenoProjectileImpactEffect
    damage:
      types:
        Heat: 10 # TODO RMC14 damage fall-off and higher at close range
  - type: CMArmorPiercing
    amount: 10

