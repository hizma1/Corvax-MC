- type: entity
  parent: XenoSpitProjectile
  id: CCMXenoSniperSpitProjectile
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: xeno_acid_strong
      shader: unshaded
  - type: Projectile
    impactEffect: null
    damage:
      types:
        Heat: 40 # TODO RMC14 damage fall-off and higher at close range
  - type: ModifyTargetOnHit
    add:
    - type: UserAcided
      armorPiercing: 40
      damage:
        types:
          Heat: 1
      duration: 20
    whitelist:
      components:
      - Marine
  - type: ProjectileMaxRange
    max: 20
  - type: RMCStunOnHit
    stuns:
    - whitelist:
        minMobSize: VerySmallXeno
      maxRange: 20
      stunTime: 0
      slowTime: 4
      knockBackPowerMin: 1
      knockBackPowerMax: 3
      knockBackSpeed: 5
      forceKnockBack: true
      slowsEffectBigXenos: true
      dazeTime: 3.4
  - type: XenoProjectile
    deleteOnFriendlyXeno: false
  - type: SpawnOnTerminate
    spawn: CCMXenoAcidSpraySniper
  - type: CMArmorPiercing
    amount: 10

- type: entity
  parent: XenoAcidSprayWeak
  id: CCMXenoAcidSpraySniper
  name: weak splatter
  description: It burns! It burns, but not as much!
  components:
  - type: Sprite
    layers:
    - state: acid2-weak
  - type: DamageOnCollide
    paralyze: 1
    damage:
      types:
        Heat: 28.8
    chainDamage:
      types:
        Heat: 8.8
  - type: TimedDespawn
    lifetime: 0.6
  - type: SprayExtinguishTileFire
    extinguishAmount: 13

- type: entity
  id: CCMXenoGreatSlowingSpitProjectile
  parent: XenoBaseProjectile
  name: greater slowing spit
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: neurotoxin
      shader: unshaded
  - type: XenoSlowingSpitProjectile
    armorResistsKnockdown: true
  - type: XenoProjectile
    deleteOnFriendlyXeno: true
  - type: DrainOnHit
  - type: ProjectileMaxRange
    max: 8
  - type: Projectile
    impactEffect: XenoProjectileImpactEffect
    damage:
      types:
        Heat: 10 # TODO RMC14 damage fall-off and higher at close range
  - type: CMArmorPiercing
    amount: 10

- type: entity
  id: CCMXenoGreatScatteredSpitProjectile
  parent: XenoBaseProjectile
  name: great scattered spit
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: neurotoxin
      shader: unshaded
  - type: XenoSlowingSpitProjectile
    slow: 0
    paralyze: 1.25
    armorResistsKnockdown: false
  - type: XenoProjectile
    deleteOnFriendlyXeno: true
  - type: ProjectileMaxRange
    max: 6
  - type: Projectile
    impactEffect: XenoProjectileImpactEffect
    damage:
      types:
        Heat: 5 # TODO RMC14 damage fall-off and higher at close range
  - type: CMArmorPiercing
    amount: 10

- type: entity
  parent: XenoAcidSprayWeak
  id: CCMXenoAcidSprayRanger
  name: weak splatter
  description: It burns! It burns, but not as much!
  components:
  - type: Sprite
    layers:
    - state: acid2-weak
  - type: DamageOnCollide
    paralyze: 0
    damage:
      types:
        Heat: 10
    chainDamage:
      types:
        Heat: 5
  - type: TimedDespawn
