- type: entity
  parent: XenoSpitProjectile
  id: CCMXenoSniperSpitProjectile
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: xeno_acid_strong
      shader: unshaded
  - type: Projectile
    impactEffect: null
    damage:
      types:
        Heat: 50 # TODO RMC14 damage fall-off and higher at close range
  - type: ModifyTargetOnHit
    add:
    - type: UserAcided
      armorPiercing: 40
      damage:
        types:
          Heat: 1
      duration: 20
    whitelist:
      components:
      - Marine
  - type: ProjectileMaxRange
    max: 20
  - type: RMCStunOnHit
    stuns:
    - whitelist:
        minMobSize: VerySmallXeno
      maxRange: 20
      stunTime: 0
      slowTime: 4
      knockBackPowerMin: 1
      knockBackPowerMax: 3
      knockBackSpeed: 5
      forceKnockBack: true
      slowsEffectBigXenos: true
      dazeTime: 3.4
  - type: XenoProjectile
    deleteOnFriendlyXeno: false

- type: entity
  parent: XenoAcidSprayWeak
  id: CCMXenoAcidSpraySniper
  name: weak splatter
  description: It burns! It burns, but not as much!
  components:
  - type: Sprite
    layers:
    - state: acid2-weak
  - type: DamageOnCollide
    paralyze: 1
    damage:
      types:
        Heat: 28.8
    chainDamage:
      types:
        Heat: 8.8
  - type: TimedDespawn
    lifetime: 0.6
  - type: SprayExtinguishTileFire
    extinguishAmount: 13
