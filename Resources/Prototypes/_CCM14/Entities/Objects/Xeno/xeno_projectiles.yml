- type: entity
  parent: XenoSpitProjectile
  id: CCMXenoSniperSpitProjectile
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Xeno/xeno_projectiles.rsi
    scale: 1.3, 3.3
    layers:
    - state: xeno_acid_strong
      shader: unshaded
  - type: Projectile
    impactEffect: XenoProjectileImpactEffect
    damage:
      types:
        Heat: 40 # TODO RMC14 damage fall-off and higher at close range
  - type: ModifyTargetOnHit
    add:
    - type: UserAcided
      armorPiercing: 40
      damage:
        types:
          Heat: 1
      duration: 3
    whitelist:
      components:
      - Marine
  - type: ProjectileMaxRange
    max: 18
  - type: RMCProjectileDamageFalloff
    thresholds:
    - range: 20
      falloff: 9999
      ignoreModifiers: true
  - type: SpawnOnTerminate
    spawn: CCMXenoAcidSprayProjectileSniper
  - type: CMArmorPiercing
    amount: 10
  - type: RMCProjectileAccuracy
    accuracy: 200
  - type: TimedDespawn
    lifetime: 6

- type: entity
  parent: XenoAcidSprayWeak
  id: CCMXenoAcidSprayProjectileSniper
  name: weak splatter
  description: It burns! It burns, but not as much!
  components:
  - type: Sprite
    scale: 0.8, 0.8
    layers:
    - state: acid2-weak
  - type: DamageOnCollide
    paralyze: 2
    damage:
      types:
        Heat: 0
    chainDamage:
      types:
        Heat: 0
  - type: TimedDespawn
    lifetime: 0.6
  - type: SprayExtinguishTileFire
    extinguishAmount: 13

