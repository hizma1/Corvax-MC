    key: enum.CCMCommunicationsConsoleUi.Key
  - type: ActivatableUIRequiresAccess
  - type: AccessReader
    access: [ [ "RMCAccessCommand" ] ]
  - type: UserInterface
    interfaces:
      enum.CCMCommunicationsConsoleUi.Key:
        type: CCMCommunicationsConsoleBui
  - type: CCMCommunicationsConsole
