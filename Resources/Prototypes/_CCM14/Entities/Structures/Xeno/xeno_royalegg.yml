- type: entity
  id: CCMXenoRoyalEgg
  parent: XenoEgg
  name: royal egg
  description: A particularly large, unusual egg with a iridescent sheen.
  components:
  - type: XenoEgg
    spawn: CCMXenoRoyalParasite
    minTime: 10
    maxTime: 15
    eggOpenTime: 0.9
    knockdownTime: 1
    itemState: egg_item
    growingState: egg_growing
    grownState: egg
    openedState: egg_opened
    openingState: egg_opening
    normalSprite: _CCM14/Structures/Xenos/xeno_royal_egg.rsi
    currentSprite: _CCM14/Structures/Xenos/xeno_royal_egg.rsi
  - type: Sprite
    sprite: _CCM14/Structures/Xenos/xeno_royal_egg.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 75
      behaviors:
      - !type:BurnBodyBehavior { }
