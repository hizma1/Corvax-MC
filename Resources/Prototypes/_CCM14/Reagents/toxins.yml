- type: reagent
  parent: CMReagent
  id: CCMXenoLightNeuroToxin
  name: reagent-name-rmclightneurotoxin
  desc: reagent-desc-rmclightneurotoxin
  physicalDesc: reagent-physical-desc-acidic
  color: "#669911"
  unknown: true
  metabolisms:
    Poison:
      metabolismRate: 0.01 
      effects:
      - !type:HealthChange
        damage:
          groups:
            Toxin: 0.1
      - !type:MovespeedModifier
        walkSpeedModifier: 0.65
        sprintSpeedModifier: 0.65
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentThreshold
          min: 0.50
        key: KnockedDown
        component: KnockedDown
        time: 2
        type: Add
      - !type:GenericStatusEffect
        conditions:
        - !type:ReagentThreshold
          min: 0.50
        key: Stun
        component: Stunned
        time: 2
        type: Add
      - !type:PopupMessage
        type: Local
        visualType: SmallCaution
        messages: [ "rmc-body-stings" ]
        probability: 0.2



