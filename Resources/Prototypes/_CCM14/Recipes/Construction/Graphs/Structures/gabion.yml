- type: constructionGraph
  parent: RMC
  id: CCMGabion
  start: start
  graph:
  - node: start
    edges:
    - to: gabion_empty
      completed:
      - !type:SnapToGrid
        southRotation: true
      steps:
      - material: CMSandbagEmpty
        amount: 5
        doAfter: 6

  - node: gabion_empty
    entity: CCMGabionEmpty
    edges:
    - to: start
      completed:
      - !type:GivePrototype
        prototype: CMSandbagEmpty
        amount: 5
      - !type:DeleteEntity {}
      steps:
      - tool: CCMDigging
        doAfter: 2
    - to: gabion
      completed:
      - !type:GivePrototype
        prototype: CMSandbagEmpty
        amount: 5
      steps:
      - material: CMSandbagFull
        amount: 5
        doAfter: 5

  - node: gabion
    entity: CCMGabion
    edges:
    - to: gabion_empty
      steps:
      - tool: CCMDigging
        doAfter: 3
