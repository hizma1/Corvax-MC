- type: entity
  id: CCMBaseXenoTarget
  parent: BaseStructureDynamic
  abstract: true
  components:
  - type: Sprite
    sprite: _CCM14/Objects/xeno-target.rsi
    state: target_stake
    noRot: true
  - type: Repairable
  - type: DamagePopup
    allowTypeChange: true
    damagePopupType: Combined
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 200
        mask:
        - FullTileMask
        layer:
        - WallLayer
  - type: InteractionOutline
  - type: Physics
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 1000000
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 500000
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel:
            min: 5
            max: 5
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  name: Drone target left
  id: CCMTargetDroneLeft
  parent: CCMBaseXenoTarget
  description: A shooting target. This one is xeno drone
  components:
  - type: Sprite
    sprite: _CCM14/Objects/xeno-target.rsi
    state: drone_l

- type: entity
  name: Drone target right
  id: CCMTargetDroneRight
  parent: CCMBaseXenoTarget
  description: A shooting target. This one is xeno drone
  components:
  - type: Sprite
    sprite: _CCM14/Objects/xeno-target.rsi
    state: drone_r
