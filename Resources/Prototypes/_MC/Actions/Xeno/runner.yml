- type: entity
  parent: ActionXenoBase
  id: MCActionXenoEvasion
  name: Evasion (0)
  description: Take evasive action, forcing non-friendly projectiles that would hit you to miss for a short duration so long as you keep moving.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: soak
    useDelay: 25
  - type: InstantAction
    event: !type:MCXenoEvasionActionEvent
      plasmaCost: 0
  - type: XenoActionPlasma
    cost: 0

# Melter
- type: entity
  parent: ActionXenoBase
  id: MCActionXenoMelterPounce
  name: Pounce (50)
  description: Leap at your target, tackling and disarming them.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: pounce
    useDelay: 15
  - type: TargetAction
    range: 100
    checkCanAccess: false
  - type: WorldTargetAction
    event: !type:MCXenoPounceActionEvent
      plasmaCost: 50
  - type: XenoActionPlasma
    cost: 50

- type: entity
  parent: ActionXenoBase
  id: MCActionXenoMelterShroud
  name: Melter Shroud (50)
  description: Creates see-through acid smoke below yourself.
  components:
  - type: Action
    itemIconStyle: NoItem
    icon:
      sprite: _RMC14/Actions/xeno_actions.rsi
      state: acid_shroud
    useDelay: 50
  - type: InstantAction
    event: !type:MCXenoMelterShroudActionEvent
      energyCost: 200

- type: entity
  parent: ActionXenoAcidWeak
  id: MCActionXenoMelterAcid
  components:
  - type: EntityTargetAction
    event: !type:XenoCorrosiveAcidEvent
      acidId: XenoAcidWeak
      plasmaCost: 75
      time: 125
      dps: 4
      expendableLightDps: 0.3
      applyTimeMultiplier: 0.5

# Acids
- type: entity
  id: MCXenoAcidSprayMelter
  components:
  - type: TimedDespawn
    lifetime: 5
  - type: AcidTrap # TODO: Make MC component
    trapLevel: 1
    cost: 70
    spray: XenoAcidSprayTrapWeak
  - type: DamageOnCollide
    damage:
      types:
        Burn: 15
    chainDamage:
      types:
        Burn: 15

# Smoke
- type: entity
  parent: MCSmokeXeno
  id: MCSmokeXenoAcidMelter
  components:
  - type: Tag
    tags:
    - MCSmoke
    - HideContextMenu
  - type: Sprite
    color: "#FFBF58"
  - type: MCEdgeSpreader
    range: 3
  - type: DamageOverTime
    affectsDead: false
    affectsInfectedNested: false
    armorPiercingDamage:
      types:
        Heat: 5
        Asphyxiation: 1
    damage:
      types:
        Heat: 10
    barricadeDamage:
      types:
        Heat: 2.5
    whitelist:
      components:
      - Marine
  - type: MCTimedDespawnDisappearanceVisuals
    maxAlpha: 0.36