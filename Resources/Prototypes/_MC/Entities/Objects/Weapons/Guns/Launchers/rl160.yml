  name: 67mm light-explosive shell
  components:
  - type: Sprite
    layers:
    - state: shell_le
  - type: CMArmorPiercing
    amount: 50
  - type: Explosive
    maxIntensity: 150
    intensitySlope: 50
    totalIntensity: 150

- type: entity
  parent: MCProjectileRocketShell
  id: MCProjectileRocketShellSmoke
  name: 67mm Chemical (Smoke) shell
  components:
  - type: Sprite
    layers:
    - state: shell_smoke
  - type: Projectile
