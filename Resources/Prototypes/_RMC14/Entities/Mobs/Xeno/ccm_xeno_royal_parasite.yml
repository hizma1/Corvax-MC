- type: entity
  id: CCMXenoRoyalParasite
  parent: [CMXenoParasite, CMXenoTail]
  description: A royal parasite that can infect multiple hosts during its lifetime
  components:
  - type: GhostRole
    name: ccm-xeno-royal-parasite-ghost-role-name
    prob: 0
    raffle:
      settings: parasiteTimeRequirement
  - type: CCMRoyalParasite
    maxInfections: 2
    infectionCooldown: 30
  - type: GuideHelp
    guides:
    - RMCGuideRoleParasite
  #  - CCMGuideRoleRoyalParasite
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.4
    baseSprintSpeed: 4.5
  - type: AcidBloodSplash
    damage:
      types:
        Heat: 10
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/RoyalParasite/royalparasite.rsi
  - type: Clothing
    quickEquip: false
    slots: [mask]
    sprite: _RMC14/Mobs/Xenonids/RoyalParasite/royal_parasite_mask.rsi
  - type: CCMParasiteSprite
    maskRsi: _RMC14/Mobs/Xenonids/RoyalParasite/royal_parasite_mask.rsi
    maskInventoryState: icon
    normalRsi: _RMC14/Mobs/Xenonids/RoyalParasite/royalparasite.rsi
    normalState: alive
  - type: HideLayerClothing
    slots:
    - Snout
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: XenoPlasma
    plasma: 20
    maxPlasma: 20
    plasmaRegenOnWeeds: 2
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: royalparasite
  - type: DamageOffWeeds
    damage:
      types:
        Blunt: 2
  - type: MobThresholds
    thresholds:
      0: Alive
      75: Dead
  - type: Xeno
    role: CCMXenoRoyalParasite
    actionIds:
    - ActionXenoRest
    - ActionXenoWatch
    - ActionXenoLeap
    - ActionXenoTailStabBoiler
  - type: CMArmor
    xenoArmor: 5
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 25
  - type: XenoLeap
    plasmaCost: 5
    knockdownTime: 2
    range: 5.5
    delay: 1.5
  - type: SleepNPC
  - type: ParasiteAI

