- type: entity
  abstract: true
  parent:
  - CMXenoDeveloped
  - CMXenoTail
  - CMXenoFlammable
  - RMCXenoSpeechSounds
  - RMCXenoCommendationReceiver
  - RMCXenoMobCollision
  id: CMXenoCrusherBase
  name: Crusher
  description: A huge alien with an enormous armored crest.
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCrusher
  - type: GhostRole
    name: cm-job-name-xeno-crusher
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Crusher/crusher.rsi
  - type: MobState
    allowedStates:
    - Alive
    - Critical
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      800: Critical
      900: Dead
  - type: Xeno
    role: CMXenoCrusher
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoStomp
    - ActionXenoDevolve
    tier: 3
    hudOffset: -0.15,0.1
    unlockAt: 900 # 15 minutes
  - type: XenoRegen
    standHealingMultiplier: 0.66
  - type: XenoHeavy
  - type: XenoDevolve
    devolvesTo:
    - CMXenoWarrior
  - type: XenoDevour
  - type: XenoStomp
    damage:
      types:
        Blunt: 65
    selfEffect: CMEffectSelfStomp
  - type: XenoAnimateMovement
  - type: XenoPlasma
    plasma: 400
    maxPlasma: 400
    plasmaRegenOnWeeds: 4
  - type: CMArmor
    xenoArmor: 30
    explosionArmor: 100
  - type: XenoClaws
    clawType: VerySharp
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 40
      types:
        Structural: 20 #CCM Изменения
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 48
      types:
        Structural: 28 #CCM Изменения
  - type: XenoMeleeSlow
    slowTime: 2
  - type: Tackle
    chance: 0.25
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.66
    baseSprintSpeed: 3
  - type: SlowOnPull
    slowdowns:
    - multiplier: 0.68
      whitelist:
        components:
        - Marine
    - multiplier: 0.755
      whitelist:
        components:
        - XenoLight
    - multiplier: 0.5275
      whitelist:
        components:
        - XenoHeavy
  - type: XenoBrutalize
    damage:
      types:
        Blunt: 16
  - type: RMCSize
    size: Immobile
  - type: RMCXenoDamageVisuals 
    prefix: crusher
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: crusher
  - type: StunOnExplosionReceived
    weak: false
  - type: IntelRecoverCorpseObjectiveOnDeath
    value: 0.7
  - type: TantrumSpeedBuff
  - type: FixedIdentity
    name: cm-job-name-xeno-crusher
  - type: RMCSurgeryXenoHeart
    item: RMCOrganXenoHeartT3


- type: entity
  parent: CMXenoCrusherBase
  id: RMCXenoCrusher
  components:
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoCharge
    - ActionXenoStomp
    - ActionXenoDefensiveShield
    - ActionXenoToggleCharging
    - ActionXenoDevolve
  - type: CrusherShield
    amount: 300 #CCM Changed - Base 200
    explosionResistanceDuration: 5 #CCM Changed - Base 2
  - type: XenoCharge
    damage:
      types:
        Blunt: 60
        Structural: 750
  - type: XenoToggleCharging #CCM Change
  - type: XenoShield
  - type: XenoEvolution
    strains:
    - RMCXenoCrusherCharger
  - type: RMCActionOrder
    id: RMCXenoCrusher

- type: entity
  parent: CMXenoCrusherBase
  id: RMCXenoCrusherCharger
  suffix: Charger
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Crusher/charger_crusher.rsi
  - type: MobThresholds
    thresholds:
      0: Alive
      880: Critical
      980: Dead
  - type: Xeno
    ignorePheromones: Frenzy
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoToggleCharging
    - ActionXenoStomp
    - ActionXenoTumble
#    - ActionXenoRam #CCM Changed - Old fling
    - CCMActionXenoSwap #CCM Change
    - ActionXenoDevolve
  - type: CMArmor
    xenoArmor: 30
    frontalArmor: 15
    sideArmor: 5
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 30
      types:
        Structural: 30 #CCM Изменения
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 36
      types:
        Structural: 36 #CCM Изменения
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.9
    baseSprintSpeed: 3.4
  - type: XenoStrain
    name: rmc-xeno-charger-name
    description: rmc-xeno-charger-description
    popup: rmc-xeno-charger-popup
  - type: CombatMode
    toggleMouseRotator: false
  - type: XenoTumble
    damage:
      types:
        Blunt: 15
#  - type: XenoFling #RMC Old Fling
#    paralyzeTime: 0
#    slowTime: 8
  - type: XenoFling #CCM Changed
    range: -2
    dazeTime: 2
    throwSpeed: 7.5
    paralyzeTime: 0
    slowTime: 8
  - type: XenoStomp # TODO RMC14 screen shake?
    plasmaCost: 25
    paralyzeUnderOnly: true
    range: 3.95
    damage:
      types:
        Blunt: 75
  - type: XenoToggleCharging #CCM Changed - Base : maxStage: 8, minimumSteps: 2
    maxStage: 12
    minimumSteps: 2
  - type: XenoHidden
  - type: RMCActionOrder
    id: RMCXenoCrusherCharger
  - type: ExplosionResistance #CCM Change
    damageCoefficient: 1.25 #Base coefficient - 2
  - type: MeleeDamageMultiplier #CCM Change
    multiplier: 10
    whitelist:
      components:
      - Vehicle #CCM - x10 damage to any vehicle, like tank or humvy
