- type: entity
  abstract: true
  parent:
  - CMXenoDeveloped
  - CMXenoTail
  - CMXenoFlammable
  - RMCXenoSpeechSounds
  - RMCXenoCommendationReceiver
  - RMCXenoMobCollision
  id: CMXenoCrusherBase
  name: Crusher
  description: A huge alien with an enormous armored crest.
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCrusher
  - type: GhostRole
    name: cm-job-name-xeno-crusher
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Crusher/crusher.rsi
  - type: MobState
    allowedStates:
    - Alive
    - Critical
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      700: Critical
      800: Dead
  - type: Xeno
    role: CMXenoCrusher
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoStomp
    - ActionXenoDevolve
    tier: 3
    hudOffset: -0.15,0.1
    unlockAt: 900 # 15 minutes
  - type: XenoRegen
    standHealingMultiplier: 0.66
  - type: XenoHeavy
  - type: XenoDevolve
    devolvesTo:
    - CMXenoWarrior
  - type: XenoDevour
  - type: XenoStomp
    damage:
      types:
        Blunt: 65
    selfEffect: CMEffectSelfStomp
  - type: XenoAnimateMovement
  - type: XenoPlasma
    plasma: 400
    maxPlasma: 400
    plasmaRegenOnWeeds: 4
  - type: CMArmor
    xenoArmor: 30
    explosionArmor: 100
  - type: XenoClaws
    clawType: VerySharp
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 40
      types:
        Structural: 30 #CCM Изменения
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 48
      types:
        Structural: 38 #CCM Изменения
  - type: XenoMeleeSlow
    slowTime: 2
  - type: Tackle
    chance: 0.25
  - type: MovementSpeedModifier
    baseWalkSpeed: 1.66
    baseSprintSpeed: 3
  - type: SlowOnPull
    slowdowns:
    - multiplier: 0.68
      whitelist:
        components:
        - Marine
    - multiplier: 0.755
      whitelist:
        components:
        - XenoLight
    - multiplier: 0.5275
      whitelist:
        components:
        - XenoHeavy
  - type: XenoBrutalize
    damage:
      types:
        Blunt: 16
  - type: RMCSize
    size: Immobile
#  - type: RMCXenoDamageVisuals 
#    prefix: crusher
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: crusher
  - type: StunOnExplosionReceived
    weak: false
  - type: IntelRecoverCorpseObjectiveOnDeath
    value: 0.7
  - type: TantrumSpeedBuff
  - type: FixedIdentity
    name: cm-job-name-xeno-crusher
  - type: RMCSurgeryXenoHeart
    item: RMCOrganXenoHeartT3


- type: entity
  parent: CMXenoCrusherBase
  id: RMCXenoCrusher
  components:
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoCharge
    - ActionXenoStomp
    - ActionXenoDefensiveShield
    - ActionXenoToggleCharging
    - ActionXenoTumble #CCM Change
    - CCMActionXenoHeadcliff #CCM
    - CCMActionXenoEndure #CCM
    - ActionXenoDevolve
  - type: CrusherShield
  - type: XenoCharge
    damage:
      types:
        Blunt: 60
        Structural: 750
  - type: MobThresholds #CCM Change
    thresholds:
      0: Alive
      800: Critical
      900: Dead
  - type: CMArmor # CCM Change
    xenoArmor: 30
    frontalArmor: 10
    sideArmor: 5
  - type: XenoShield
  - type: XenoTumble #CCM Change
    range: 1
    impactRange: 2
    damage:
      types:
        Blunt: 25
  - type: XenoToggleCharging #CCM Change
  - type: XenoTailLash #CCM Change
    effect: RMCEffectXenoTelegraphRed
    effectEdge: RMCEffectXenoTelegraphRed
    height: 1
    width: 3
    windup: 0.1
    stunTime: 1.25
    slowTime: 4
    flingDistance: 6
  - type: XenoFortify #CCM Change
    armor: 15
    frontalArmor: 0
    explosionArmor: 80
    changeExplosionWeakness: false
    canHeadbuttFortified: false
    canMoveFortified: true
    damageAddedFortified:
      groups:
        Brute: -30
  - type: MeleeDamageMultiplier #CCM Change
    multiplier: 8
    whitelist:
      components:
      - Vehicle
  - type: Sprite #CCM Backup
    sprite: _RMC14/Mobs/Xenonids/Crusher/charger_crusher.rsi
#  - type: XenoEvolution #CCM Change
#    strains:
#    - RMCXenoCrusherCharger
  - type: RMCActionOrder
    id: RMCXenoCrusher

