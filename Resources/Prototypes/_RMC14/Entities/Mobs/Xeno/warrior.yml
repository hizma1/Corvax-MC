- type: entity
  parent:
  - CMXenoDeveloped
  - CMXenoTail
  - CMXenoFlammable
  - RMCXenoSpeechSounds
  - RMCXenoCommendationReceiver
  - RMCXenoMobCollision
  id: CMXenoWarrior
  name: Warrior
  description: A beefy alien with an armored carapace.
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleWarrior
  - type: GhostRole
    name: cm-job-name-xeno-warrior
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Warrior/warrior.rsi
  - type: MobState
    allowedStates:
    - Alive
    - Critical
    - Dead
  - type: MobThresholds
    thresholds:
      0: Alive
      500: Critical
      600: Dead
  - type: Xeno
    role: CMXenoWarrior
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoPunch
    - ActionXenoLunge
    - ActionXenoFling
    - ActionXenoDevolve
    tier: 2
    hudOffset: -0.15,0.25
    unlockAt: 540 # 9 minutes
  - type: XenoRegen
    restHealMultiplier:  1.4
  - type: XenoLight
  - type: XenoDevolve
    devolvesTo:
    - CMXenoDefender
  - type: XenoDevour
  - type: XenoPunch
    damage:
      types:
        Blunt: 27.5
  - type: XenoFling
  - type: XenoLunge
  - type: XenoPlasma
    plasma: 0
    maxPlasma: 0
    plasmaRegenOnWeeds: 0
  - type: XenoEvolution
    max: 500
    evolvesTo:
    - RMCXenoCrusher
    - CMXenoPraetorian
    strains: # CCM Change
    - CCMXenoWarriorBoxer # CCM Change
  - type: CMArmor
    xenoArmor: 20
    explosionArmor: 40
  - type: XenoClaws
    clawType: Sharp
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 35
  - type: XenoTailStab
    tailDamage:
      groups:
        Brute: 48
  - type: Tackle
    max: 4
  - type: SlowOnPull
    slowdowns:
    - multiplier: 0.4525
      whitelist:
        components:
        - Marine
    - multiplier: 0.5025
      whitelist:
        components:
        - XenoLight
    - multiplier: 0.3625
      whitelist:
        components:
        - XenoHeavy
  - type: XenoLifesteal
  - type: RMCXenoDamageVisuals
    prefix: warrior
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: warrior
  - type: IntelRecoverCorpseObjectiveOnDeath
    value: 0.2
  - type: FixedIdentity
    name: cm-job-name-xeno-warrior
  - type: RMCSurgeryXenoHeart
    item: RMCOrganXenoHeartT2
  - type: RMCActionOrder
    id: CMXenoWarrior

# // CCM Xeno Strain 
- type: entity
  parent: CMXenoWarrior
  id: CCMXenoWarriorBoxer
  suffix: Boxer
  components:
  - type: Sprite
    sprite: _RMC14/Mobs/Xenonids/Warrior_Boxer/warrior_boxer.rsi
  - type: XenoStrain
    name: ccm-xeno-boxer-name
    description: ccm-xeno-boxer-description
    popup: ccm-xeno-boxer-popup
  - type: Xeno
    actionIds:
    - ActionXenoRest
    - ActionXenoRegurgitate
    - ActionXenoWatch
    - ActionXenoTailStab
    - ActionXenoPunch
    - CCMActionXenoBoxerAdvance
    - CCMActionXenoBoxerWidePunch
    - CCMActionXenoBoxerTailKnock
    - ActionXenoDevolve
  - type: XenoLeap
    delay: 0
    range: 2
    moveDelayTime: 0
    knockdownTime: 0
    leapSound: /Audio/Weapons/Xeno/alien_footstep_charge3.ogg
    hitEffect: CMEffectPunch
    targetJitterTime: 1
    targetCameraShakeStrength: 1
    damage:
      groups:
        Brute: 20
  - type: XenoPunch
    damage:
      types:
        Blunt: 27.5
  - type: XenoTailSweep
    paralyzeTime: 0
    damage:
      types:
        Slash: 30
  - type: XenoScissorCut
    attackEffect: RMCEffectSlam
    telegraphEffectEdge: RMCEffectXenoTelegraphRed
    damage:
      types:
        Slash: 30
    slashSound:
        collection: Punch
        params:
          variation: 0.15
  - type: MeleeWeapon
    animation: CMEffectPunch
    damage:
      groups:
        Brute: 35
    soundHit:
        collection: Punch
        params:
          variation: 0.15
  - type: XenoPlasma
    plasma: 100
    maxPlasma: 100
    plasmaRegenOnWeeds: 6
  - type: XenoEvolution
    max: 500
    evolvesTo:
    - RMCXenoCrusher
    - CMXenoPraetorian
    strains: []
