- type: entity
  parent: BaseStorageItem
  id: CMSurgicalCase
  name: surgical case
  description: It's a medical case for storing basic surgical tools. # TODO RMC14 extended description with instructions for treating internal bleeds once those are added
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Storage/surgical_case.rsi
    layers:
    - state: surgical_case_base
    - state: surgical_case_open
      map: [ "openLayer" ]
      visible: false
    - state: surgical_case_closed
      map: [ "closedLayer" ]
      visible: false
  - type: Item
    size: Small
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,12,3 # CCM-ADD 12 slots
    whitelist:
      components:
# CCM14 ADD
      - CMSurgeryTool
      - CMCautery
      - CMSurgicalDrill
      - CMBoneSaw
      - CMBoneSetter
      - CMBoneGel
      - CMUOrganClamp
      - CMUBoneGraft
# CCM14 END
      - CMScalpel
      - CMHemostat
      - CMRetractor
      tags:
      - CMSurgicalLine
      - CMSynthGraft
      - CMRollerBed # CCM-14
      - CMBurnKit # CCM-14
      #TODO FixoVein
  - type: FixedItemSizeStorage
  - type: Tag
    tags:
      - CMSurgicalCase
  - type: GenericVisualizer
    visuals:
      enum.SharedBagOpenVisuals.BagState:
        openLayer:
          Open: { visible: true }
          Closed: { visible: false }
        closedLayer:
          Open: { visible: false }
          Closed: { visible: true }
  - type: Appearance
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 1000

- type: entity
  parent: CMSurgicalCase
  id: CMSurgicalCaseFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMScalpel
    - id: CMHemostat
    - id: CMRetractor
# CCM14 ADD
    - id: CMCautery
    - id: CMSurgicalDrill
    - id: CMCircularSaw
    - id: CMBonesetter
    - id: CMBoneGel
    - id: CMUOrganClampItem
    - id: CMUBoneGraftItem
    - id: CMPortableSurgicalBed
    - id: CCMPillCanisterOrgansMix
# CCM14 END

- type: entity
  parent: CMSurgicalCase
  id: RMCSurgicalCaseRCM
  name: RCM surgical case
  description: An improved surgical case used by the Royal Crown Marines, capable of fitting more tools.
  suffix: RCM
  components:
  - type: Storage
    grid:
    - 0,0,13,2 # CCM14 TWEAK-14 slots

- type: entity
  parent: RMCSurgicalCaseRCM
  id: RMCSurgicalCaseRCMFilled # TODO RMC14 unique sprite
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMScalpel
    - id: CMHemostat
    - id: CMRetractor
    - id: CMSurgicalLine
    - id: CMSynthGraft
# CCM14 ADD
    - id: CMCautery
    - id: CMSurgicalDrill
    - id: CMCircularSaw
    - id: CMBonesetter
    - id: CMBoneGel
    - id: CMUOrganClampItem
    - id: CMUBoneGraftItem
    - id: CMPortableSurgicalBed
    - id: CCMPillCanisterOrgansMix
# CCM14 END
