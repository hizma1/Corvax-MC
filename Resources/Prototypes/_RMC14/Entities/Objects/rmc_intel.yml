- type: entity
  abstract: true
  parent: BaseItem
  id: RMCIntelBase
  name: intel item
  components:
  - type: Corrodible
    isCorrodible: false
  - type: IntelDetectorTracked

- type: entity
  abstract: true
  parent: RMCIntelBase
  id: RMCIntelReadableBase
  components:
  - type: IntelReadObjective
    value: 0.1
  - type: IntelRetrieveItemObjective
    value: 0.1
  - type: Tag
    tags:
    - RMCIntelItem

- type: entity
  parent: RMCIntelReadableBase
  id: RMCIntelPaperScrap
  name: paper scrap
  description: A scrap of paper, you think some of the words might still be readable.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: paper_words
  - type: Item
    size: Tiny
  - type: IntelReadObjective
    state: Active
  - type: IntelClues
    clue: rmc-intel-clue-paper-scrap

- type: entity
  parent: RMCIntelReadableBase
  id: RMCIntelProgressReport
  name: progress report
  description: A written report from someone for their supervisor about the status of some kind of project.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: paper_p_words
  - type: Item
    size: Tiny
  - type: IntelReadObjective
    value: 0.2
    delay: 6
  - type: IntelClues
    clue: rmc-intel-clue-progress-report
    category: rmc-intel-reports

- type: entity
  parent: RMCIntelReadableBase
  id: RMCIntelFolder
  name: intel folder
  description: A folder with some documents inside.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    layers:
    - state: folder
      map: ["base" ]
  - type: Item
    size: Tiny
  - type: IntelReadObjective
    value: 0.2
    delay: 4
  - type: IntelRequires
    requiresCount: 2
  - type: IntelClues
    clue: rmc-intel-clue-folder
    category: rmc-intel-folders
  - type: RandomSprite
    available:
    - base:
        folder: ""
        folder_black: ""
        folder_blue: ""
        folder_red: ""
        folder_yellow: ""

- type: entity
  parent: RMCIntelReadableBase
  id: RMCIntelTechnicalManual
  name: technical manual
  description: A highly specified technical manual, may be of use to someone in the relevant field.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Books/Other/book.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: IntelReadObjective
    value: 0.35
    delay: 20
  - type: IntelRequires
    requiresCount: 2
  - type: IntelClues
    clue: rmc-intel-clue-technical-manual
    category: rmc-intel-manuals

- type: entity
  abstract: true
  parent: RMCIntelBase
  id: RMCIntelRetrieveDeviceBase
  components:
  - type: IntelRetrieveItemObjective
    state: Active
    value: 0.7
  - type: IntelClues
    clues: 8
  - type: IntelSerial

- type: entity
  parent: [CMHealthAnalyzer, RMCIntelRetrieveDeviceBase]
  id: RMCIntelRetrieveHealthAnalyzer
  suffix: Intel, Experimental Device
  components:
  - type: IntelClues
    clue: rmc-intel-clue-experimental-device

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCTechTreeConsole
  name: tech tree console
  description: A console used to make tech purchases.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: techweb
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.TechControlConsoleUI.Key
  - type: UserInterface
    interfaces:
      enum.TechControlConsoleUI.Key:
        type: TechControlConsoleBui
  - type: TechControlConsole
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCComputerIntel
  name: intel computer
  description: An UNMC Intel Computer for data cataloguing and distribution.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: InteractionOutline
  - type: IntelConsole

- type: entity
  id: RMCIntelTechTree
  name: intel tech tree
  categories: [ HideSpawnMenu ]
  components:
  - type: RMCVehicleSupplyTech
  - type: IntelTechTree
    tree:
      options:
      -
        - name: Разблокировать Уровень 1
          description: Переход дерева технологий на следующий этап развития.
          cost: 0
          events:
          - !type:TechUnlockTierEvent
            tier: 1
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: upgrade
      -
        - name: Хамви БРК
          description: Разблокирует БРК конфигурацию бронеавтомобиля Хамви.
          cost: 5
          events:
          - !type:TechUnlockVehicleEvent
            unlock: RMCVehicleHumveeARC
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: humvee
        - name: Увеличение бюджета снабжения
          description: Выделение дополнительных ресурсов отделу снабжения для закупок.
          cost: 7
          increase: 1
          repurchasable: true
          events:
          - !type:TechRequisitionsBudgetEvent
            amount: 5000
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: Для данной операции санкционирован дополнительный бюджет снабжения.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: budget_req
        - name: Увеличение бюджета десантного шаттла
          description: Выделение дополнительных ресурсов для фабрикатора компонентов десантного корабля.
          cost: 6
          increase: 1
          repurchasable: true
          events:
          - !type:TechDropshipBudgetEvent
            amount: 2000
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: Для данной операции санкционированы дополнительные очки фабрикатора компонентов десантного корабля.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: budget_ds
        - name: Разблокировать Уровень 2
          description: Переход дерева технологий на следующий этап развития.
          cost: 5
          events:
          - !type:TechUnlockTierEvent
            tier: 2
          - !type:TechAnnounceEvent
            author: ПОВЫШЕНА БОЕВАЯ ГОТОВНОСТЬ «ДАВИДА»
            message: "УРОВЕНЬ ОЦЕНКИ УГРОЗЫ ПОВЫШЕН ДО 2.

              Разрешено использование активов Уровня 2"
            sound: /Audio/_RMC14/AI/commandreport.ogg
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: upgrade
      -
        - name: Танк
          description: Разрешает развертывание тяжелого бронированного танка. Главная ударная сила на передовой.
          cost: 10
          events:
          - !type:TechUnlockVehicleEvent
            unlock: RMCVehicleTank
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: Для наземных операций разрешена поддержка тяжелой бронетехникой.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: tank
        - name: Доп. снаряды ОБ - Фугасные
          description: Осколочно-фугасные боеприпасы для орбитальной пушки.
          cost: 5
          increase: 2
          repurchasable: true
          events:
          - !type:TechLogisticsDeliveryEvent
            object: RMCOrbitalCannonWarheadExplosive
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: На склад снабжения доставлены дополнительные фугасные боеголовки для орбитальной бомбардировки.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: ob_he
        - name: Доп. снаряды ОБ - Зажигательные
          description: Зажигательные боеприпасы для орбитальной пушки.
          cost: 5
          increase: 2
          repurchasable: true
          events:
          - !type:TechLogisticsDeliveryEvent
            object: RMCOrbitalCannonWarheadIncendiary
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: На склад снабжения доставлены дополнительные зажигательные боеголовки для орбитальной бомбардировки.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: ob_incend
        - name: Доп. снаряды ОБ - Кассетные
          description: Кассетные боеприпасы для орбитальной пушки.
          cost: 5
          increase: 2
          repurchasable: true
          events:
          - !type:TechLogisticsDeliveryEvent
            object: RMCOrbitalCannonWarheadCluster
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: На склад снабжения доставлены дополнительные кассетные боеголовки для орбитальной бомбардировки.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: ob_cluster
        - name: Разблокировать Уровень 3
          description: Переход дерева технологий на следующий этап развития.
          cost: 5
          events:
          - !type:TechUnlockTierEvent
            tier: 3
          - !type:TechAnnounceEvent
            author: ПОВЫШЕНА БОЕВАЯ ГОТОВНОСТЬ «ДАВИДА»
            message: "УРОВЕНЬ ОЦЕНКИ УГРОЗЫ ПОВЫШЕН ДО 3.

              Разрешено использование активов Уровня 3"
            sound: /Audio/_RMC14/AI/commandreport.ogg
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: upgrade
      -
        - name: Разбудить дополнительный отряд
          description: Вывод из криосна дополнительных пехотинцев для усиления операции.
          cost: 6
          increase: 6
          repurchasable: true
          events:
          - !type:TechCryoMarinesEvent
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: Дополнительный отряд выводится из криосна.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: cryotroops
        - name: Разбудить дополнительного специалиста
          description: Вывод из криосна ещё одного обученного специалиста.
          cost: 8
          events:
          - !type:TechCryoSpecEvent
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: Дополнительный специалист выводится из криосна.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: overshield
        - name: Разблокировать Уровень 4
          description: Переход дерева технологий на следующий этап развития.
          cost: 5
          events:
          - !type:TechUnlockTierEvent
            tier: 4
          - !type:TechAnnounceEvent
            author: ПОВЫШЕНА БОЕВАЯ ГОТОВНОСТЬ «ДАВИДА»
            message: "УРОВЕНЬ ОЦЕНКИ УГРОЗЫ ПОВЫШЕН ДО 4.

              Разрешено использование активов Уровня 4"
            sound: /Audio/_RMC14/AI/commandreport.ogg
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: upgrade
      -
        - name: Ядерное устройство
          description: Приобретение тактического ядерного заряда. Доступно только через 80 минут после начала операции. Единственный способ быть во всём уверенным.
          cost: 5
          timeLock: 80m
          events:
          - !type:TechLogisticsDeliveryEvent
            object: RMCNuke
          - !type:TechAnnounceEvent
            author: УПРАВЛЕНИЕ АКТИВАМИ «ДАВИДА»
            message: Использование ядерного вооружения санкционировано. Заряд будет доставлен на склад снабжения через ASRS.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: nuke
- type: Tag
  id: RMCIntelItem

- type: entity
  parent: RMCIntelPaperScrap
  id: RMCIntelDebug
  suffix: DEBUG, DO NOT MAP
  components:
  - type: IntelReadObjective
    state: Active
    value: 999
