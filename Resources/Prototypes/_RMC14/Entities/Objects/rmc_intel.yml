- type: entity
  abstract: true
  parent: BaseItem
  id: RMCIntelBase
  name: intel item
  components:
  - type: Corrodible
    isCorrodible: false
  - type: IntelDetectorTracked

- type: entity
  abstract: true
  parent: RMCIntelBase
  id: RMCIntelReadableBase
  components:
  - type: IntelReadObjective
    value: 0.1
  - type: IntelRetrieveItemObjective
    value: 0.1
  - type: Tag
    tags:
    - RMCIntelItem

- type: entity
  parent: RMCIntelReadableBase
  id: RMCIntelPaperScrap
  name: paper scrap
  description: A scrap of paper, you think some of the words might still be readable.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: paper_words
  - type: Item
    size: Tiny
  - type: IntelReadObjective
    state: Active
  - type: IntelClues
    clue: rmc-intel-clue-paper-scrap

- type: entity
  parent: RMCIntelReadableBase
  id: RMCIntelProgressReport
  name: progress report
  description: A written report from someone for their supervisor about the status of some kind of project.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: paper_p_words
  - type: Item
    size: Tiny
  - type: IntelReadObjective
    value: 0.2
    delay: 6
  - type: IntelClues
    clue: rmc-intel-clue-progress-report
    category: rmc-intel-reports

- type: entity
  parent: RMCIntelReadableBase
  id: RMCIntelFolder
  name: intel folder
  description: A folder with some documents inside.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    layers:
    - state: folder
      map: ["base" ]
  - type: Item
    size: Tiny
  - type: IntelReadObjective
    value: 0.2
    delay: 4
  - type: IntelRequires
    requiresCount: 2
  - type: IntelClues
    clue: rmc-intel-clue-folder
    category: rmc-intel-folders
  - type: RandomSprite
    available:
    - base:
        folder: ""
        folder_black: ""
        folder_blue: ""
        folder_red: ""
        folder_yellow: ""

- type: entity
  parent: RMCIntelReadableBase
  id: RMCIntelTechnicalManual
  name: technical manual
  description: A highly specified technical manual, may be of use to someone in the relevant field.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Books/Other/book.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: IntelReadObjective
    value: 0.35
    delay: 20
  - type: IntelRequires
    requiresCount: 2
  - type: IntelClues
    clue: rmc-intel-clue-technical-manual
    category: rmc-intel-manuals

- type: entity
  abstract: true
  parent: RMCIntelBase
  id: RMCIntelRetrieveDeviceBase
  components:
  - type: IntelRetrieveItemObjective
    state: Active
    value: 0.7
  - type: IntelClues
    clues: 8
  - type: IntelSerial

- type: entity
  parent: [CMHealthAnalyzer, RMCIntelRetrieveDeviceBase]
  id: RMCIntelRetrieveHealthAnalyzer
  suffix: Intel, Experimental Device
  components:
  - type: IntelClues
    clue: rmc-intel-clue-experimental-device

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCTechTreeConsole
  name: tech tree console
  description: A console used to make tech purchases.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: techweb
  - type: InteractionOutline
  - type: ActivatableUI
    key: enum.TechControlConsoleUI.Key
  - type: UserInterface
    interfaces:
      enum.TechControlConsoleUI.Key:
        type: TechControlConsoleBui
  - type: TechControlConsole
  - type: ActivatableUIBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCCommunicationsConsoleBase
  id: RMCComputerIntel
  name: intel computer
  description: An UNMC Intel Computer for data cataloguing and distribution.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: terminal1_old
  - type: InteractionOutline
  - type: IntelConsole

- type: entity
  id: RMCIntelTechTree
  name: intel tech tree
  categories: [ HideSpawnMenu ]
  components:
  - type: IntelTechTree
    tree:
      options:
      -
        - name: Разблокировать 1 тир
          description: повысить уровень поддержки до 1.
          cost: 0
          events:
          - !type:TechUnlockTierEvent
            tier: 1
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: upgrade
      -
        - name: Пополнение Бюджета Отдела поставок
          description: Пополнить баланс в Отделе поставок.
          cost: 7
          increase: 1
          repurchasable: true
          events:
          - !type:TechRequisitionsBudgetEvent
            amount: 5000
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: Баланс в Отделе поставок был пополнен.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: budget_req
        - name: детли в изготовитель
          description: пополнить детали в изготовителе десантного шатла.
          cost: 6
          increase: 1
          repurchasable: true
          events:
          - !type:TechDropshipBudgetEvent
            amount: 2000
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: В изготовитель деталей десантного шатла были добавлены поинты.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: budget_ds
        - name: Разблокировать 2 тир
          description: повысить уровень поддержки до 2.
          cost: 5
          events:
          - !type:TechUnlockTierEvent
            tier: 2
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: "УРОВЕНЬ ОЦЕНКИ УГРОЗЫ ПОВЫШЕН ДО УРОВНЯ 2.

                2 СТУПЕНЬ поддержки была разблокирована."
            sound: /Audio/_RMC14/AI/commandreport.ogg
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: upgrade
      -
        - name: Дополнительные снаряды ОБ - Фугасная
          description: Высоковзрывчатые бомбардировочные боеприпасы, которые будут загружены в орбитальную пушку.
          cost: 5
          increase: 2
          repurchasable: true
          events:
          - !type:TechLogisticsDeliveryEvent
            object: RMCOrbitalCannonWarheadExplosive
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: Дополнительные боеголовки для орбитальной бомбардировки (Фугасная) были доставлены в Отдел поставок.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: ob_he
        - name: Дополнительные снаряды ОБ - Зажигательные
          description: Легковоспламеняющиеся бомбардировочные боеприпасы, которые будут загружены в орбитальную пушку.
          cost: 5
          increase: 2
          repurchasable: true
          events:
          - !type:TechLogisticsDeliveryEvent
            object: RMCOrbitalCannonWarheadIncendiary
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: Дополнительные боеголовки для орбитальной бомбардировки (зажигательные) были доставлены в Отдел поставок.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: ob_incend
        - name: Дополнительные снаряды ОБ - кластерая
          description: Осколочно-фугасные боеприпасы для бомбардировки должны быть загружены в орбитальную пушку.
          cost: 5
          increase: 2
          repurchasable: true
          events:
          - !type:TechLogisticsDeliveryEvent
            object: RMCOrbitalCannonWarheadCluster
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: Дополнительные боеголовки для орбитальной бомбардировки (кластерные) были доставлены в Отдел поставок.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: ob_cluster
        - name: Разблокировать 3 тир
          description: повысить уровень поддержки до 3.
          cost: 5
          events:
          - !type:TechUnlockTierEvent
            tier: 3
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: "УРОВЕНЬ ОЦЕНКИ УГРОЗЫ ПОВЫШЕН ДО УРОВНЯ 3.

              3 СТУПЕНЬ поддержки была разблокирована."
            sound: /Audio/_RMC14/AI/commandreport.ogg
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: upgrade
      -
        - name: Пробудить отряд фокстрод
          description: Пробуждает дополнительные войска для борьбы с любыми угрозами.
          cost: 6
          increase: 6
          repurchasable: true
          events:
          - !type:TechCryoMarinesEvent
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: Пробуждается дополнительный отряд для борьбы с угрозой.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: cryotroops
        - name: Пробудить специалиста от криосна
          description: Пробуждается дополнительный специалист для борьбы с любыми угрозами.
          cost: 8
          events:
          - !type:TechCryoSpecEvent
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: Специалист был пробуждён от криосна.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: overshield
        - name: Разблокировать 4 тир
          description: повысить уровень поддержки до 4.
          cost: 5
          events:
          - !type:TechUnlockTierEvent
            tier: 4
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: "УРОВЕНЬ ОЦЕНКИ УГРОЗЫ ПОВЫШЕН ДО УРОВНЯ 4.

              4 СТУПЕНЬ поддержки была разблокирована."
            sound: /Audio/_RMC14/AI/commandreport.ogg
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: upgrade
      -
        - name: Ядерная боеголовка
          description: 	Приобретите ядерную боеголовку. Её можно приобрести только через 80 минут после начала операции. Это единственный способ убедиться.
          cost: 5
          timeLock: 80m
          events:
          - !type:TechLogisticsDeliveryEvent
            object: RMCNuke
          - !type:TechAnnounceEvent
            author: РАЗРЕШЕНИЕ НА ИСПОЛЬЗОВАНИЕ СПЕЦИАЛЬНЫХ АКТИВОВ ДАВИДА
            message: Развертывание ядерной боеголовки санкционировано, и она будет доставлена в Отдел поставок через ASRS.
          icon:
            sprite: _RMC14/Interface/tech_tree.rsi
            state: nuke
- type: Tag
  id: RMCIntelItem

- type: entity
  parent: RMCIntelPaperScrap
  id: RMCIntelDebug
  suffix: DEBUG, DO NOT MAP
  components:
  - type: IntelReadObjective
    state: Active
    value: 999
