# EQUIPMENT VENDOR

- type: entity
  parent: ColMarTechBase
  id: ColMarTechCrewCombatCorrespondent
  name: ColMarTech Combat Correspondent Equipment Rack
  description: An automated rack hooked up to a colossal storage of Reporter standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessPress" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMCorrespondent
    - CMCombatCorrespondent
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: RMCVendorBundleCrewCombatCorrespondent
        name: незаменимый набор репортёра # CCM14
      - id: CMSatchel
        name: кожаный ранец # CCM14
      - id: RMCCameraBroadcasting
        name: вещательная камера # CCM14
        recommended: true
    - name: Гражданское снаряжение # CCM14
      jobs:
      - CMCorrespondent
      takeAll: CMCivilian
      entries:
      - id: RMCPortablePressFax
        name: Портативный факс # CCM14
        recommended: true
      - id: RMCTentUNMCExtendedCorrespondentFolded
        name: Переносная палатка # CCM14
    - name: Сумка # CCM14
      jobs:
      - CMCorrespondent
      choices: { CMSatchel: 1 }
      entries:
      - id: CMSatchel
        name: Кожаная сумка # CCM14
      - id: RMCBackpackRTOBagPhone
        name: Телефонный ранец # CCM14
    - name: Тактическая сумка # CCM14
      jobs:
      - CMCombatCorrespondent
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarine
        replaceSlot: back
        name: Лёгкий рюкзак IMP # CCM14
      - id: CMSatchelMarine
        replaceSlot: back
        name: Ранец ККМП # CCM14
        recommended: true
    - name: Combat Sidearm
      jobs:
      - CMCombatCorrespondent
      choices: { CMBelt: 1 }
      entries:
      - id: RMCM1984BeltFilled
        name: M1984 Pistol Holster Rig
        recommended: true
    - name: Combat Webbing
      jobs:
      - CMCombatCorrespondent
      choices: { CMWebbing: 1 }
      entries:
      - id: CMWebbingBrown
        name: Brown Webbing
        recommended: true
    - name: Combat Pouches
      jobs:
      - CMCombatCorrespondent
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchGeneralMedium
        name: Medium General Pouch
        recommended: true
    - name: Униформа # CCM14
      choices: { CMUniform: 1 }
