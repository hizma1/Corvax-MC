# EQUIPMENT VENDOR

- type: entity
  parent: ColMarTechBase
  id: ColMarTechCrewCombatCorrespondent
  name: ColMarTech Combat Correspondent Equipment Rack
  description: An automated rack hooked up to a colossal storage of Reporter standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessPress" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMCorrespondent
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: RMCVendorBundleCrewCombatCorrespondent
        name: незаменимый набор репортёра # CCM14
      - id: CMSatchel
        name: кожаный ранец # CCM14
      - id: RMCCameraBroadcasting
        name: вещательная камера # CCM14
        recommended: true
    #- name: Civilian Equipment TODO - Some way to ensure only the civilian correspondent can buy this
    #  takeAll: CMStandard
    #  entries:
    #  - id: PortableFaxMachine
    #    name: Portable Press Fax Machine
    #    recommended: true
    - name: Униформа # CCM14
      choices: { CMUniform: 1 }
      entries:
      - id: RMCJumpsuitCorrespondentBlack
        name: чёрная униформа корреспондента # CCM14
      - id: RMCJumpsuitCorrespondentOrange
        name: оранжевая униформа корреспондента # CCM14
      - id: RMCJumpsuitCorrespondentRed
        name: красная униформа корреспондента # CCM14
    - name: Броня # CCM14
      choices: { CMArmor: 1 }
      entries:
      - id: CMArmorPress
        name: бронежилет прессы # CCM14
        recommended: true
      - id: RMCCoatCorrespondentBlue
        name: синяя куртка военного корреспондента # CCM14
      - id: RMCHazardVestBlack
        name: чёрный сигнальный жилет # CCM14
      - id: RMCCoatCorrespondentBlack
        name: чёрная куртка военного корреспондента # CCM14
      - id: RMCCoatCorrespondentGreen
        name: зелёная куртка военного корреспондента # CCM14
    - name: Шлемы # CCM14
      choices: { CMHelmet: 1 }
      entries:
      - id: CMArmorHelmetPress
        name: шлем прессы # CCM14
        recommended: true
      - id: RMCHeadCapCorrespondent
        name: кепка корреспондента # CCM14
      - id: RMCHeadCapFedoraGrey
        name: серая федора # CCM14
    - name: Расходники # CCM14
      entries:
      #- id: /obj/item/device/camera
      #  name: Camera
      #  points: 10
      #- id: /obj/item/device/camera_film
      #  name: Camera Film
      #  points: 5
      #- id: /obj/item/device/toner
      #  name: Toner
      # points: 5
      #- id: /obj/item/storage/box/tapes
      #  name: Regulation Tapes
      #  points: 15
      - id: CMPaperBin30
        name: корзина для бумаг # CCM14
        points: 10

- type: entity
  parent: CMVendorBundleRiflemanApparel
  id: RMCVendorBundleCrewCombatCorrespondent
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Tools/Light/flashlight.rsi
    state: flashlight
  - type: CMVendorBundle
    bundle:
    - RMCFlashlight
    - CMPen
