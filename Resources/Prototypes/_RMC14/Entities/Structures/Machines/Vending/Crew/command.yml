# Staff Officer #

# Equipment Vend
- type: entity
  parent: ColMarTechBase
  id: ColMarTechStaffOfficerEquipment
  name: ColMarTech Staff Officer Equipment Rack
  description: An automated equipment vendor for Staff Officers
  components:
  - type: AccessReader
    access:
    - [ "RMCAccessCommand" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/equipment.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMStaffOfficer
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMBootsBlackFilled
      - id: RMCHeadsetMarineCommand
      - id: CMMRE
    - name: Стандартное снаряжение # CCM14
      takeAll: CMUniform
      entries:
      - id: CMJumpsuitBO
        name: служебная униформа # CCM14
      - id: CMJumpsuitOperations
        name: оперативная униформа # CCM14
        recommended: true
      - id: CMHandsBlackInsulated
    - name: Верхняя одежда # CCM14
      choices: { CMCoat: 1}
      entries:
      - id: RMCCoatService
        recommended: true
    - name: Головные уборы # CCM14
      choices: { CMHat: 1 }
      entries:
      - id: RMCHeadBeret
        recommended: true
      - id: RMCHeadCapFlippable
        recommended: true
      - id: CMHeadCapOfficer
        recommended: true
      - id: CMHeadCapPeakedService
        recommended: true
    - name: Нашивки # CCM14
      takeAll: RMCPatch
      entries:
      - id: RMCPatchFallingFalcons
      - id: RMCPatchFallingFalconsAlt
        name: плечевая нашивка 121-й роты # CCM14
      - id: RMCPatchFallingFalconsLarge
        name: нагрудная нашивка 121-й роты # CCM14
      - id: RMCPatchUNMC
      - id: RMCPatchUnitedNationsSquare
        name: плечевая нашивка с флагом ОПЗ # CCM14
      - id: RMCPatchUnitedNations
        name: плечевая нашивка ОПЗ # CCM14
    - name: Личное оружие # CCM14
      choices: { CMWeapon: 1 }
      entries:
      - id: RMCMK80BeltFilled
        name: пистолет MK80 # CCM14
        recommended: true
      - id: RMCM1984BeltFilled
        name: служебный пистолет M1984 # CCM14
        recommended: true
      - id: RMCM77BeltFilled
        name: пистолет M77 # CCM14
        recommended: true
      - id: RMCM44BeltFilled
        name: револьвер M44 # CCM14
        recommended: true
    - name: Рюкзаки # CCM14
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpack
      - id: CMSatchel
    - name: Разное # CCM14
      entries:
      - id: RMCBinoculars
        points: 5
      - id: RMCRangefinder
        points: 8
      - id: RMCLaserDesignator
        points: 12
        recommended: true
      - id: RMCFlashlight
        points: 1
        recommended: true
      - id: RMCMotionDetector
        points: 5
        recommended: true
      - id: SprayBottleSpaceCleaner
