- type: entity
  parent: ColMarTechBase
  id: ColMarTechCrewMaintTech
  name: ColMarTech Maintenance Technician Equipment Rack
  description: An automated rack hooked up to a colossal storage of Maintenance Technician standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessEngineering" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMMaintTech
    sections:
    - name: Набор техника (Обязательно) # CCM14
      takeAll: CMMaintenanceSet
      entries:
      - id: CMVendorBundleCrewMaintenanceEssentials
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMHeadsetEngineer
      - id: CMMRE
        name: сухой паёк # CCM14
      # map
    - name: Перчатки # CCM14
      choices: { CMHands: 1 }
      entries:
      - id: CMHandsInsulated
      - id: CMHandsBlackInsulated
    - name: Шлемы # CCM14
      choices: { CMHelmet: 1 }
      entries:
      - id: CMHeadBeretEngineer
      - id: RMCHardhatWhite
      - id: RMCHardhatOrange
      - id: RMCHardhatBlue
      - id: RMCHelmetWelding
    - name: Спецодежда # CCM14
      choices: { CMSuit: 1 }
      entries:
      - id: RMCHazardVestBlack
      - id: RMCHazardVestBlue
      - id: RMCHazardVest
      - id: RMCHazardVestYellow
    - name: Рюкзаки # CCM14
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarineTech
        replaceSlot: back
      - id: CMSatchelMarineTech
        replaceSlot: back
      - id: CMBackpackWelder
        replaceSlot: back
      - id: RMCSatchelWelder
        replaceSlot: back
        recommended: true
      - id: RMCSatchelWelderChestrig
        replaceSlot: back
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltUtilityFilled
        name: пояс для инструментов M276 (Заполненный) # CCM14
        recommended: true
    - name: Подсумки # CCM14
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchGeneralMedium
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь) # CCM14 # TODO RMC14 splints comma
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
        recommended: true
      - id: RMCPouchConstruction
        recommended: true
      - id: RMCPouchElectronicsFill
        name: подсумок для электроники (Полный) # CCM14
      - id: RMCPouchToolsFill
        name: подсумок для инструментов (Полный) # CCM14
      - id: RMCPouchFlareFilled
        name: подсумок для фальшфейеров (Полный) # CCM14
    - name: Маски # CCM14
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather
    - name: Аксессуары # CCM14
      choices: { CMAccessory: 1 }
      entries:
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
    - name: Запасное снаряжение # CCM14
      entries:
      - id: RMCSynthResetKey
        points: 20

- type: entity
  parent: CMVendorBundleRiflemanApparel
  id: CMVendorBundleCrewMaintenanceEssentials
  name: essential maintenance set
  description: Contains a flashlight and a light replacer.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/Janitorial/light_replacer.rsi
    state: lightreplacer0
  - type: CMVendorBundle
    bundle:
    - RMCLightReplacer
    # demo scanner
    - TrashBag
    - RMCToolboxMechanicalFilled
    - RMCFlashlight
