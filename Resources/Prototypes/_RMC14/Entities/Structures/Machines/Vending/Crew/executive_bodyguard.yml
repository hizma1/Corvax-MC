
  #Clothes Rack
- type: entity
  parent: ColMarTechWardrobeCorp
  id: ColMarTechWardrobeExecutiveBodyguard
  name: executive bodyguard clothes rack
  description: An automated rack hooked up to a colossal storage of Security Division standard-issue clothing.
  components:
  - type: CMAutomatedVendor
    jobs:
    - RMCWeYaExecutiveBodyguard
    sections:
    - name: Стандартное снаряжение # CCM-14
      takeAll: CMStandard
      entries:
      - id: RMCBootsPMCFilled
      - id: RMCHeadsetExecutiveBodyguard
      - id: RMCGlassesSecurityBlue
      # RMC14 TODO: Blue SecHud Perscription
    - name: Комбинезоны # CCM-14
      choices: { CMUniform: 5 }
      entries:
      - id: CMJumpsuitLiaisonBlack
      - id: RMCJumpsuitLiaisonBlackSuitskirt
      - id: CMJumpsuitLiaisonBlue
      - id: CMJumpsuitLiaisonBrown
      - id: CMJumpsuitLiaisonCorporateFormal
    - name: Верхняя одежда # CCM-14
      choices: { CMArmor: 5 }
      entries:
      - id: RMCJacketCorporateBlack
      - id: RMCJacketCorporateBlue
      - id: RMCJacketCorporateBrown
      - id: RMCJacketCorporateFormal
      - id: RMCCoatBureauTrenchCoatBeige
      - id: RMCCoatBureauTrenchCoatBrown
      - id: RMCCoatBureauTrenchCoatGrey
    - name: Рюкзаки # CCM-14
      choices: { CMBackpack: 1 }
      entries:
      - id: RMCSatchelBlack
    - name: Аксессуары # CCM-14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack

