- type: entity
  parent: ColMarTechBase
  id: ColMarTechIntelGear
  name: ColMarTech intelligence officer gear rack
  description: An automated gear rack for IOs.
  components:
  - type: AccessReader
    access:
    - [ "RMCAccessCommand" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/intel.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMIntelOfficer
    sections:
    - name: Набор разведчика (Обязательно) # CCM14
      takeAll: RMCIntelSet
      entries:
      - id: RMCVendorBundleIntel
    - name: Инженерное снаряжение # CCM14
      entries:
      - id: CMAPCElectronics
        points: 5
      - id: RMCExplosivePlastic
        points: 10
      - id: RMCWeldingGoggles
        points: 5
    - name: Основные боеприпасы # CCM14
      entries:
      - id: CMMagazineRifleM4SPRAP
        points: 10
      - id: CMMagazineSMGM63AP
        points: 10
      - id: CMMagazineSMGM63Ext
        points: 10
      - id: CMMagazineRifleM54CAP
        points: 10
      - id: CMMagazineRifleM54CExt
        points: 10
    - name: Вторичные боеприпасы # CCM14
      entries:
      - id: RMCSpeedLoader44Marksman
        points: 10 # TODO RMC14 heavy speed revolver
      - id: RMCMagazinePistolM1984AP
        points: 5
      - id: RMCMagazinePistolM1984HP
        points: 5
      - id: CMMagazinePistolMK80
        points: 10
      - id: RMCMagazinePistolSU6
        points: 10
    - name: Ограниченное вооружение # CCM14
      entries:
      - id: RMCGunCasePistolMK80
        points: 15
      - id: RMCGunCasePistolSmart
        points: 15
    - name: Особое снаряжение # CCM14
      entries:
      - id: CMBeltUtilityCombatFilled
        points: 15
    - name: Подсумки # CCM14
      entries:
      - id: RMCPouchMagazineLarge
        points: 10
      - id: RMCPouchShotgunLarge
        points: 10
      - id: RMCPouchAutoinjector
        points: 15
        recommended: true
      - id: RMCPouchMacheteFilled
        name: ножны H6B для мачете M2132 (Заполненные) # CCM14
        points: 10
    - name: Утилиты # CCM14
      entries:
      - id: CMFireExtinguisherPortable
        points: 5
      - id: RMCFulton20
        points: 10
      - id: RMCMotionDetector
        points: 15
        recommended: true
      - id: RMCIntelDetector
        points: 5
    - name: Бинокли # CCM14
      entries:
      - id: RMCBinoculars
        points: 5
      - id: RMCRangefinder
        points: 10
      - id: RMCLaserDesignator
        points: 15
    - name: Визоры для шлема # CCM14
      entries:
      - id: RMCVisorMedical
        points: 5
      - id: RMCVisorWelding
        points: 5
      - id: RMCVisorNightVision
        points: 25
        recommended: true
    - name: Ключи шифрования # CCM14
      entries:
      - id: CMEncryptionKeyIntel
        points: 5
    - name: Запасной комплект разведки # CCM14
      entries:
      - id: RMCKitIntel
        name: набор полевой поддержки разведчика (для необученного персонала) # CCM14
        points: 20

- type: entity
  parent: ColMarTechBase
  id: ColMarTechIntelEquipment
  name: ColMarTech intelligence officer equipment rack
  description: An automated rack hooked up to a colossal storage of IO standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "RMCAccessCommand" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/equipment.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMIntelOfficer
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: RMCIntelEquipment
      entries:
      - id: CMHeadsetIntel
      - id: CMMRE
    - name: Перчатки # CCM14
      choices: { CMHands: 1 }
      entries:
      - id: CMHandsInsulated
      - id: CMHandsBlackInsulated
    - name: Броня # CCM14
      takeOne: CMArmor
      entries:
      - id: RMCArmorXM4
      - id: RMCArmorM3LightVariants
      - id: RMCArmorVestIntel
    - name: Верхняя одежда # CCM14
      choices: { CMCoat: 1 }
      entries:
      - id: RMCCoatService
    - name: Рюкзаки # CCM14
      choices: { CMBag: 1 }
      entries:
      - id: CMSatchelMarineIntel
        replaceSlot: back
        recommended: true
      - id: RMCSatchelMarineIntelChestrig
        replaceSlot: back
        recommended: true
      - id: RMCSatchelMarineIntelSatchel
        replaceSlot: back
        recommended: true
      - id: RMCBackpackRTO
        replaceSlot: back
    - name: Шлемы # CCM14
      choices: { CMHelmet: 1 }
      entries:
      - id: RMCArmorHelmetM12Intel
        recommended: true
    - name: Головные уборы # CCM14
      choices: { CMHat: 1 }
      entries:
      - id: RMCHeadBeretGreen
      - id: CMHeadBeretTan
      - id: CMHeadCapOfficer
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltMarine
        recommended: true
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterSMG
      - id: RMCBeltHolsterRevolver
      - id: RMCM276ShotgunShellLoadingRig
      - id: CMBeltUtilityFilled
        name: пояс для инструментов M276 (Заполненный) # CCM14
        recommended: true
    - name: Подсумки # CCM14
      choices: { CMPouches: 2 }
      entries:
      - id: RMCPouchDocument
        recommended: true
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь) # CCM14 # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
      - id: RMCPouchFlareFilled
        name: подсумок для фальшфейеров (Полный) # CCM14
      - id: RMCPouchFuelTank
      - id: RMCPouchGeneralLarge
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchPistol
      - id: RMCPouchToolsFill
        name: подсумок для инструментов (Полный) # CCM14
        recommended: true
      - id: RMCPouchSling
    - name: Аксессуары # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBlack
      - id: CMWebbingBrown
        recommended: true
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
    - name: Маски # CCM14
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif

