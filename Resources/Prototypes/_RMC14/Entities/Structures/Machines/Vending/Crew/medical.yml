# MEDICAL

- type: entity
  parent: ColMarTechBase
  id: ColMarTechCrewMedicalEquipment
  name: ColMarTech medical equipment rack
  description: An automated equipment vendor for the Medical Department.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessMedical" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/medical_equipment.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMNurse
    - CMDoctor
    - RMCFieldDoctor
    - CMResearcher
    - CMCMO
    sections:
    - name: Меднабор (Обязательно) # CCM14
      jobs:
      - CMDoctor
      - RMCFieldDoctor
      - CMResearcher
      - CMCMO
      takeAll: CMMedicalSet
      entries:
      - id: RMCVendorBundleCrewMedicalEssentialsDoctor
    - name: Меднабор (Обязательно) # CCM14
      jobs:
      - CMNurse
      takeAll: CMMedicalSet
      entries:
      - id: CMVendorBundleCrewMedicalEssentialsNurse
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMHandsLatex
      - id: CMHeadsetMedical
    - name: Очки # CCM14
      choices: { CMEyewear: 1 }
      entries:
      - id: RMCGlassesMedicalHUDGlasses
#      - id: Prescription Medical HUD Glasses
    - name: Униформа # CCM14
      choices: { CMUniform: 1 }
      entries:
      - id: CMScrubsGreen
      - id: CMScrubsBlue
      - id: RMCScrubsLightBlue
      - id: CMScrubsPurple
      - id: RMCScrubsOlive
      - id: RMCScrubsGrey
    - name: Спецодежда # CCM14
      jobs:
      - CMNurse
      choices: { CMSuit: 1 }
      entries:
      - id: RMCMedicalApron
    - name: Спецодежда # CCM14
      jobs:
      - CMDoctor
      choices: { CMSuit: 1 }
      entries:
      - id: RMCLabcoat
      - id: RMCMedicalApron
#    - name: Snow gear (Snow use only)
#      takeall: CMSnowgear
#      entries:
#      - id: Snowcoat
#      - id: Balaclava
#      - id: Snow Scarf
    - name: Головные уборы # CCM14
      choices: { CMHeadwear: 1 }
      entries:
      - id: CMHeadCapSurgOrange
      - id: CMHeadCapSurgBlue
      - id: CMHeadCapSurgPurple
      - id: CMHeadCapSurgGreen
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: CMBeltMedicBagFilled
        name: медицинский пояс M276 (Заполненный) # CCM14
      - id: CMBeltMedicalFilled
        name: пояс для медэкипировки M276 (Заполненный) # CCM14
    - name: Рюкзаки # CCM14
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarine
#        name: backpack
        replaceSlot: back
      - id: CMSatchelMarine
#        name: satchel
        replaceSlot: back
      - id: CMBackpackMedical
        replaceSlot: back
      - id: CMSatchelMedical
        replaceSlot: back
    - name: Подсумки # CCM14
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchAutoinjector
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь) # CCM14 # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
      - id: RMCPouchFirstResponder
      - id: RMCPouchMedical
      - id: RMCPouchMedkit
        recommended: true
      - id: RMCPouchReagentCanisterBicaridine
        recommended: true
        name: подсумок канистры сжатых реагентов\n(Бикаридин) # CCM14
      - id: RMCPouchReagentCanisterKelotane
        recommended: true
        name: подсумок канистры сжатых реагентов\n(Келотан) # CCM14
      - id: RMCPouchReagentCanisterTricordrazineRevival
        recommended: true
        name: подсумок канистры сжатых реагентов\n(Реанимационная смесь - Трикордразин) # CCM14
      #      - id: CMPressurizedReagentCanisterPouchPeridaxonRevivalMix
      #        recommended: true
      #        name: Pressurized Reagent Canister Pouch\n(Revival Mix - Peridaxon)
      - id: RMCPouchReagentCanisterTricordrazine
        recommended: true
        name: подсумок канистры сжатых реагентов\n(Трикордразин) # CCM14
      - id: RMCPouchReagentCanister
        recommended: true
        name: подсумок канистры сжатых реагентов\n(ПУСТОЙ) # CCM14
      - id: RMCPouchSling
    - name: Аксессуары # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
