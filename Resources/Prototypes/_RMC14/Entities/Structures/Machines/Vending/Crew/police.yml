# MILITARY POLICE

- type: entity
  parent: ColMarTechBase
  id: ColMarTechMilitaryPoliceEquipment
  name: ColMarTech Military Police Equipment Rack
  description: An automated rack hooked up to a colossal storage of Military Police standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessBrig" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMMilitaryPolice
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMHandsBlackMarine
      - id: CMHeadsetMPO
      - id: CMBootsBlackFilled
      - id: CMGlassesSecurity
      - id: CMBeltSecurityMPFilled
    - name: Шлемы # CCM14
      choices: { CMHelmet: 1 }
      entries:
      - id: CMArmorHelmetM10MP
    - name: Броня # CCM14
      choices: { CMArmor: 1 }
      entries:
      - id: CMArmorM2MP
      - id: RMCArmorVestMP
    - name: Головные уборы # CCM14
      choices: { CMHat: 1 }
      entries:
      - id: CMHeadBeretRed
    - name: Пистолетные кейсы # CCM14
      choices: { CMGunCase: 1 }
      entries:
      - id: RMCGunCasePistolM77
      - id: RMCGunCasePistolM44
      - id: RMCGunCasePistolM1984
    - name: Рюкзаки # CCM14
      choices: { CMBackpack: 1 }
      entries:
      - id: CMSatchelSecurity
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterRevolver
      - id: RMCBeltUtilityGeneral
    - name: Подсумки # CCM14
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchGeneralMedium
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь) # CCM14 # TODO RMC14 add 'splints,'
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
      - id: RMCPouchMagazinePistol
      - id: RMCPouchPistol
    - name: Маски # CCM14
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather
    - name: Аксессуары # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
    - name: Уставы и пособия # CCM14
      entries:
      - id: RMCGuidebookLawMarine
        amount: 10
      - id: RMCGuidebookSOP
        amount: 10

