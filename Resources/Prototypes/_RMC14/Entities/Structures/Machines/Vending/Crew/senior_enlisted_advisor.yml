- type: entity
  parent: ColMarTechBase
  id: ColMarTechEquipmentSEA
  name: ColMarTech SEA equipment rack
  description: An automated rack hooked up to a colossal storage of Senior Enlisted Advisor standard-issue equipment.
  suffix: SEA
  components:
  - type: AccessReader
    access: [["CMAccessSEA"]]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/equipment.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSeniorEnlistedAdvisor
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMSatchel
      - id: CMBootsBlackFilled
      - id: CMMRE
      - id: RMCStampSEA
    - name: Перчатки # CCM14
      choices: { CMGloves: 1 }
      entries:
      - id: CMHandsBlackMarine
      - id: CMHandsInsulated
      - id: CMHandsBlackInsulated
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltUtilityFilled
        name: пояс для инструментов M276 (Заполненный) # CCM14
      - id: CMBeltMedicBagFilled
        name: медицинский пояс M276 (Заполненный) # CCM14
      - id: CMBeltUtilityCombatFilled
        name: боевой пояс для инструментов M276 (Заполненный) # CCM14
    - name: Подсумки # CCM14
      choices: { CMPouches: 2 }
      entries:
      - id: RMCPouchAutoinjectorFill
      - id: RMCPouchGeneralLarge
      - id: RMCPouchMagazineLarge
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchShotgunLarge
      - id: RMCPouchMedkit
      - id: RMCPouchPistol
      - id: RMCPouchSling
    - name: Шлемы # CCM14
      choices: { CMHelmet: 1 }
      entries:
      - id: ArmorHelmetM10
    - name: Броня # CCM14
      choices: { CMArmor: 1 }
      entries:
      - id: CMArmorM3VLBallistics
      - id: RMCArmorM3LightPadded
      - id: RMCArmorM3MediumVariants
    - name: Верхняя одежда # CCM14
      choices: { CMCoat: 1 }
      entries:
      - id: RMCCoatService
    - name: Очки # CCM14
      choices: { CMEyewear: 1 }
      entries:
      - id: RMCWeldingGoggles
      - id: RMCGlassesMedicalHUDGlasses
      #Prescription Medical HUD Glasses
      - id: CMGlassesSecurity
      - id: RMCGlassesMarineRpg #Sunglasses Placeholder
      - id: RMCSunglasses
    - name: Аксессуары # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
    - name: Инструменты обучения # CCM14
      takeAll: RMCSEATrainingTools
      entries:
      - id: RMCCPRDummy
        amount: 5
    - name: Уставы и пособия # CCM14
      takeAll: RMCBook
      entries:
      - id: RMCGuidebookLawMarine
        amount: 10
      - id: RMCGuidebookSOP
        amount: 10
    - name: Нашивки # CCM14
      takeAll: RMCPatch
      entries:
      - id: RMCPatchFallingFalcons
      - id: RMCPatchFallingFalconsAlt
        name: плечевая нашивка 121-й роты # CCM14
      - id: RMCPatchFallingFalconsLarge
        name: нагрудная нашивка 121-й роты # CCM14
      - id: RMCPatchUNMC
      - id: RMCPatchUnitedNationsSquare
        name: плечевая нашивка с флагом ОПЗ # CCM14
      - id: RMCPatchUnitedNations
        name: плечевая нашивка ОПЗ # CCM14
      - id: RMCPatchSEA

