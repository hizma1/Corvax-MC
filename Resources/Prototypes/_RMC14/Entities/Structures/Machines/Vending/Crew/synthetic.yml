- type: entity
  parent: ColMarTechBase
  id: ColMarTechCrewSynthetic
  name: ColMarTech Synthetic Equipment Rack
  description: An automated rack hooked up to a colossal storage of various equipment. Can be accessed only by synthetic units.
  components:
  - type: AccessReader
    access:
    - [ "RMCAccessSynth" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - RMCJobSynthetic
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      # /obj/item/coin/marine/synth
      # /obj/item/device/defibrillator/synthetic
      - id: RMCSynthResetKey
      - id: RMCHeadsetSynth
    - name: Униформа # CCM14
      choices: { CMUniform: 1 }
      entries:
      - id: RMCJumpsuitSynthetic
        # mandatory: true, TODO allow vendors to mark entries as mandatory
        # /obj/item/clothing/under/rank/synthetic/old
      - id: JumpsuitMarine
      - id: CMJumpsuitMarineMedic
    - name: Разгрузки # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
    - name: Обувь # CCM14
      choices: { RMCShoes: 1 }
      entries:
      - id: RMCShoesWhite
        recommended: true
      - id: CMBootsBlackFilled
    - name: Шлемы # CCM14
      choices: { CMHelmet: 1 }
      entries:
      - id: RMCHardhatOrange
        name: оранжевая пожарная каска # CCM14
      - id: RMCHelmetWelding
      - id: CMHeadFlapCap
    - name: Спецодежда # CCM14 # Parity Vendor Fill has one for the map's camo, then still lets the synth choose from any of the options. Hence why this has so many options.
      choices: { CMSuit: 1 }
      entries:
      - id: CMArmorM3VLSynth
        recommended: true
      - id: CMArmorM3VLSynthJungle
      - id: CMArmorM3VLSynthDesert
      - id: CMArmorM3VLSynthSnow
      - id: CMArmorM3VLSynthClassic
      - id: CMArmorM3VLSynthUrban
    - name: Перчатки # CCM14
      choices: { CMGloves: 1 }
      entries:
      - id: CMHandsInsulated
        recommended: true
      - id: CMHandsBlackInsulated
        recommended: true
      - id: CMHandsBlackMarine
      - id: CMHandsLatex
    - name: Рюкзаки # CCM14
      choices: { CMBackpack: 1 }
      entries:
      - id: RMCSmartpack
        name: синий рюкзак S-V42 # CCM14
        recommended: true
      - id: RMCSmartpackBlack
        name: чёрный рюкзак S-V42 # CCM14
      - id: RMCSmartpackGreen
        name: зелёный рюкзак S-V42 # CCM14
      - id: RMCSmartpackTan
        name: рыжевато-коричневый рюкзак S-V42 # CCM14
      - id: RMCSmartpackWhite
        name: белый рюкзак S-V42 # CCM14
      - id: RMCSmartpackA1
        name: синий рюкзак S-V42A1 # CCM14
      - id: RMCSmartpackA1Black
        name: чёрный рюкзак S-V42A1 # CCM14
      - id: RMCSmartpackA1Green
        name: зелёный рюкзак S-V42A1 # CCM14
      - id: RMCSmartpackA1Tan
        name: рыжевато-коричневый рюкзак S-V42A1 # CCM14
      - id: RMCSmartpackA1White
        name: белый рюкзак S-V42A1 # CCM14
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltMedicBagFilled
        name: медицинский пояс M276 (Заполненный) # CCM14
      - id: CMBeltMedicalFilled
        name: пояс для медэкипировки M276 (Заполненный) # CCM14
      - id: CMBeltUtilityFilled
        name: пояс для инструментов M276 (Заполненный) # CCM14
    - name: Подсумки # CCM14
      choices: { CMPouch: 2 }
      entries:
      - id: RMCPouchAutoinjector
      - id: RMCPouchConstruction
      - id: RMCPouchDocument
      - id: RMCPouchElectronicsFill
        name: подсумок для электроники (Полный) # CCM14
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь) # CCM14 # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
      - id: RMCPouchFlareFilled
        name: подсумок для фальшфейеров (Полный) # CCM14
      - id: RMCPouchGeneralLarge
      - id: RMCPouchSling
      - id: RMCPouchMedical
      - id: RMCPouchMedkit
      - id: RMCPouchReagentCanisterTricordrazineRevival
        name: подсумок канистры сжатых реагентов\n(Реанимационная смесь - Трикордразин) # CCM14
#     - id: CMPressurizedReagentCanisterPouchPeridaxonRevivalMix
#       name: Pressurized Reagent Canister Pouch\n(Revival Mix - Peridaxon)
#        recommended: true
      - id: RMCPouchReagentCanisterBicaridine
        name: подсумок канистры сжатых реагентов\n(Бикаридин) # CCM14
      - id: RMCPouchReagentCanisterKelotane
        name: подсумок канистры сжатых реагентов\n(Келотан) # CCM14
      - id: RMCPouchReagentCanisterTricordrazine
        name: подсумок канистры сжатых реагентов\n(Трикордразин) # CCM14
      - id: RMCPouchReagentCanister
        name: подсумок канистры сжатых реагентов\n(ПУСТОЙ) # CCM14
      - id: RMCPouchToolsFill
        name: подсумок для инструментов (Полный) # CCM14
      - id: RMCPouchMacheteFilled
        name: ножны H6B для мачете M2132 (Заполненные) # CCM14
    - name: Маски # CCM14
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskSterile

- type: entity
  parent: ColMarTechCrewSynthetic
  id: ColMarTechCrewSyntheticColony
