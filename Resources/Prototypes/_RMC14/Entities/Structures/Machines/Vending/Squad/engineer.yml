- type: entity
  parent: ColMarTechBase
  id: ColMarTechSCTEquipment
  name: ColMarTech squad comtech equipment rack
  description: An automated rack hooked up to a colossal storage of combat technician standard-issue equipment.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: AccessReader
    access:
    - [ "CMAccessCombatTechPrep" ]
  - type: CMAutomatedVendor
    jobs:
    - CMCombatTech
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleCombatTechnicianApparel
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Перчатки # CCM14
      choices: { CMHands: 1 }
      entries:
      - id: CMHandsInsulated
      - id: CMHandsBlackInsulated
    - name: Шлемы # CCM14
      choices: { CMHelmet: 1 }
      entries:
      - id: CMArmorHelmetM10Tech
      - id: RMCArmorHelmetM10Welding
    - name: Броня # CCM14
      choices: { CMArmor: 1 }
      entries:
      - id: RMCArmorVestSquad
      - id: RMCArmorM3LightVariants
        name: лёгкая броня # CCM14
      - id: RMCArmorM3MediumVariants
        name: средняя броня # CCM14
        recommended: true
      - id: RMCArmorM3HeavyVariants
        name: тяжёлая броня # CCM14
    - name: Рюкзаки # CCM14
      choices: { CMBackpack: 1 }
      entries:
      - id: RMCScabbardMacheteFilled
        name: ножны H5 для мачете M2132 (Заполненные) # CCM14
      - id: CMBackpackMarineTech
        replaceSlot: back
      - id: CMSatchelMarineTech
        replaceSlot: back
      - id: CMBackpackWelder
        replaceSlot: back
        recommended: true
      - id: RMCSatchelWelder
        replaceSlot: back
      - id: RMCSatchelWelderChestrig
        replaceSlot: back
        recommended: true
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltConstruction
        recommended: true
      - id: CMBeltUtilityFilled
        name: пояс для инструментов M276 (Заполненный) # CCM14
        # mandatory: true, TODO allow vendors to mark entries as mandatory
      - id: RMCBeltUtilityGeneral
      - id: CMBeltMarine
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterRevolver
      - id: RMCBeltHolsterSMG
      - id: RMCBeltHolsterSMGPouch
      - id: RMCM82FHolster
      - id: RMCM276ShotgunShellLoadingRig
      - id: RMCBeltGrenade
    - name: Подсумки # CCM14
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchConstruction
        recommended: true
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь) # CCM14 # TODO RMC14 splints comma
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
        recommended: true
      - id: RMCPouchElectronicsFill
        name: подсумок для электроники (Полный) # CCM14
      - id: RMCPouchExplosive
      - id: RMCPouchFlareFilled
        name: подсумок для фальшфейеров (Полный) # CCM14
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchGeneralMedium
      - id: RMCPouchPistol
      - id: RMCPouchToolsFill
        name: подсумок для инструментов (Полный) # CCM14
      - id: RMCPouchEngineerKit
    - name: Аксессуары # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: RMCToolWebbingSmallFilled
        name: малая разгрузка для инструментов (Полная) # CCM14
        recommended: true
      - id: CMWebbingBlack
      - id: CMWebbingBrown
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
    - name: Маски # CCM14
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather

- type: entity
  parent: ColMarTechBase
  id: ColMarTechSCTTools
  name: ColMarTech squad comTech tools vendor
  description: A vending machine that stores various extra tools that are useful on the field.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessCombatTechPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/tool.rsi
    layers:
    - state: "off"
      map: [ "enum.VendingMachineVisualLayers.Base" ]
    - state: "normal-unshaded"
      map: [ "enum.VendingMachineVisualLayers.BaseUnshaded" ]
  - type: CMAutomatedVendor
    canManualRestock: true
    access:
    - "CMAccessCombatTechPrep"
    hackable: true
    jobs:
    - CMCombatTech
    sections:
    - name: Снаряжение # CCM14
      entries:
      - id: CMBeltUtility
        name: пояс для инструментов M276 # CCM14
        amount: 4
      - id: RMCCableCoil
        amount: 4
      - id: RMCWeldingGoggles
        amount: 2
      - id: RMCEngineerKit
        amount: 2
    - name: Инструменты # CCM14
      entries:
      - id: CMWelder
        amount: 4
      - id: CMCrowbar
        amount: 4
      - id: CMScrewdriver
        amount: 4
      - id: CMWirecutter
        amount: 4
      - id: CMWrench
        amount: 4
      - id: CMMultitool
        amount: 4
      - id: CMWelderSmall
        amount: 2
      - id: RMCLightReplacer
        amount: 4
    - name: Утилиты # CCM14
      entries:
      - id: RMCSentryLaptop
        name: терминал управления турелями # CCM14
        amount: 4
