- type: entity
  parent: ColMarTechBase
  id: ColMarTechSLEquipment
  name: ColMarTech squad leader equipment rack
  description: An automated rack hooked up to a colossal storage of Squad Leader standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessSquadLeaderPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSquadLeader
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleSquadLeaderApparel
      - id: RMCBackpackRTO
        replaceSlot: back
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Броня # CCM14
      choices: { CMArmour: 1 }
      entries:
      - id: RMCArmorB12Zipties
        name: бронежилет ККМП B12 лидера (стяжки) # CCM14
        recommended: true
      - id: RMCArmorM4Zipties
        name: бронежилет ККМП M4 лидера (стяжки) # CCM14
      - id: RMCArmorVestSquadLeader
        name: бронежилет M3-XL лидера (стяжки) # CCM14
    - name: Рюкзаки # CCM14
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarine
      - id: RMCScabbardMacheteFilled
      - id: CMSatchelMarine
        recommended: true
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltMarine
        recommended: true
      - id: CMBeltMedicBag
      - id: CMBeltMedical
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterM13
      - id: RMCBeltHolsterRevolver
      - id: RMCBeltHolsterSMG
      - id: RMCBeltHolsterSMGPouch
      - id: RMCM82FHolster
      - id: RMCM276ShotgunShellLoadingRig
      - id: CMBeltUtilityFilled
        name: пояс для инструментов M276 (Заполненный) # CCM14
      - id: RMCBeltGrenade
    - name: Подсумки # CCM14
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchAutoinjectorFill
        recommended: true
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь) # CCM14 # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
        recommended: true
      - id: RMCPouchFlareFilled
        name: подсумок для фальшфейеров (Полный) # CCM14
      - id: RMCPouchFuelTank
      - id: RMCPouchGeneralLarge
        recommended: true
      - id: RMCPouchSling
      - id: RMCPouchMagazineLarge
      - id: RMCPouchShotgunLarge
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchPistol
    - name: Аксессуары # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBlack
      - id: CMWebbingBrown
        recommended: true
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
