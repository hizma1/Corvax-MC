      - id: RMCMaskRebreather

- type: entity
  parent: CMVendorBundleRiflemanApparel
  id: RMCVendorBundleCrewLeader
  name: essential SL kit
  description: Contains a laser designator, a pack of signal flares, a breaching charge and a fire extinguisher.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Explosives/plastic_explosives.rsi
    state: icon
  - type: CMVendorBundle
    bundle:
    - RMCExplosivePlastic
    - RMCPackFlareCAS
    - RMCLaserDesignator
    - CMFireExtinguisherPortable

- type: entity
  parent: RMCKitBase
  id: RMCKitRifleM4SPR
  name: M4SPR marksman kit
  description: Contains a M4SPR rifle, a 4x telescopic scope, a suppressor, an extended barrel and 2 AP magazines.
  components:
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,9,1
  - type: StorageFill
    contents:
    - id: WeaponRifleM4SPR
    - id: RMCAttachmentS84xTelescopicScope
    - id: RMCAttachmentSuppressor
    - id: RMCAttachmentExtendedBarrel
    - id: CMMagazineRifleM4SPRAP
      amount: 2

- type: entity
  parent: RMCKitBase
  id: RMCKitCM54C
  name: M54C rifle kit
  description: Contains a M54C rifle, an angled grip, a suppressor, an extended barrel and 2 AP magazines.
  components:
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,9,1
  - type: StorageFill
    contents:
    - id: RMCWeaponRifleM54C
    - id: RMCAttachmentAngledGrip
    - id: RMCAttachmentSuppressor
    - id: RMCAttachmentExtendedBarrel
    - id: CMMagazineRifleM54CAP
      amount: 2

- type: entity
  parent: RMCKitBase
  id: RMCKitEngineering
  name: engineering supply kit
  description: Contains a construction pouch with 50 metal, 30 plasteel and 15 barbed wire, and an electronics pouch with three high-capacity power cells.
  components:
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,9,1
  - type: Sprite
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
  - type: Icon
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
  - type: StorageFill
    contents:
    - id: RMCPouchConstructionFillLowGrade
    - id: RMCPouchElectronicsFill
    - id: RMCWeldingGoggles

- type: entity
  parent: RMCKitBase
  id: RMCKitPyroMini
  name: M34 pyrotechnician support kit
  description: Contains a M34 incinerator unit, a G4-1 fueltank, 3 incinerator tanks, and a portable fire extinguisher.
  components:
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,11,1
  - type: Sprite
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
  - type: Icon
    sprite: _RMC14/Objects/Storage/procase_mini.rsi
  - type: StorageFill
    contents:
    - id: RMCBackpackFlamer
    - id: RMCWeaponFlamer
    - id: RMCTankFlamer
      amount: 2 # TODO RMC14 projectile nozzle
    - id: RMCTankFlamerBGel
    - id: CMFireExtinguisherPortable

- type: entity
  parent: CMArmorB12
  id: RMCArmorB12Zipties
  name: leader B12 pattern marine armor
  description: A lightweight suit of carbon fiber body armor built for quick movement. Designed in a lovely forest green. Use it to toggle the built-in flashlight. This one has a separate pouch for a ziptie box.
  suffix: Zipties
  components:
  - type: Storage
    grid:
    - 0,0,7,1
  - type: StorageFill
    contents:
    - id: RMCBoxZiptie
  - type: LimitedStorage
    limits:
    - popup: rmc-storage-limit-not-ziptie-box
      blacklist:
        tags:
        - RMCBoxZipties
      whitelist: null
      count: 3

- type: entity
  parent: CMArmorM4
  id: RMCArmorM4Zipties
  name: leader M4 pattern marine armor
  description: A well tinkered and crafted hybrid of Smart-Gunner mesh and M3 pattern plates. Robust, yet nimble, with room for all your pouches. This one has a separate pouch for a ziptie box.
  suffix: Zipties
  components:
  - type: Storage
    grid:
    - 0,0,9,1
  - type: StorageFill
    contents:
    - id: RMCBoxZiptie
  - type: LimitedStorage
    limits:
    - popup: rmc-storage-limit-not-ziptie-box
      blacklist:
        tags:
        - RMCBoxZipties
      whitelist: null
      count: 4
