      takeAll: CMStandard
      entries:
      - id: CMVendorBundleSquadMedicalApparel
      - id: RMCHandsLatexMarine
        name: медицинские боевые перчатки # CCM14
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Броня # CCM14
      choices: { CMArmor: 1 }
      entries:
      - id: RMCArmorVestSquad
      - id: RMCArmorM3LightVariants
        name: лёгкая броня # CCM14
      - id: RMCArmorM3MediumVariants
        name: средняя броня # CCM14
        recommended: true
      - id: RMCArmorM3HeavyVariants
        name: тяжёлая броня # CCM14
    - name: Шлемы # CCM14
      choices: { CMHelmet: 1 }
      entries:
      - id: CMArmorHelmetM10Medic
      - id: RMCArmorHelmetM10MedicWhite
        recommended: true
    - name: Рюкзаки # CCM14
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarineMedic
        replaceSlot: back
      - id: CMSatchelMarineMedic
        replaceSlot: back
        recommended: true
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: CMBeltMedicBagFilled
        name: медицинский пояс M276 (Заполненный) # CCM14
      - id: CMBeltMedicalFilled
        name: пояс для медэкипировки M276 (Заполненный) # CCM14
    - name: Подсумки # CCM14
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchReagentCanisterTricordrazineRevival
        name: подсумок канистры сжатых реагентов\n(Реанимационная смесь - Трикордразин) # CCM14
        recommended: true
      - id: RMCPouchMedkit
        recommended: true
#     - id: CMPressurizedReagentCanisterPouchPeridaxonRevivalMix
#       name: Pressurized Reagent Canister Pouch\n(Revival Mix - Peridaxon)
#       recommended: true
      - id: RMCPouchAutoinjector
      - id: RMCPouchFirstResponder
      - id: RMCPouchReagentCanisterBicaridine
        name: подсумок канистры сжатых реагентов\n(Бикаридин) # CCM14
      - id: RMCPouchReagentCanisterKelotane
        name: подсумок канистры сжатых реагентов\n(Келотан) # CCM14
      - id: RMCPouchReagentCanisterTricordrazine
        name: подсумок канистры сжатых реагентов\n(Трикордразин) # CCM14
      - id: RMCPouchReagentCanister
        name: подсумок канистры сжатых реагентов\n(ПУСТОЙ) # CCM14
