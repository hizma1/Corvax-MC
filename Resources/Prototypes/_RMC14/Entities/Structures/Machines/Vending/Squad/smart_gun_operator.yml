- type: entity
  parent: ColMarTechBase
  id: ColMarTechSGEquipment
  name: ColMarTech squad Smart Gun equipment rack
  description: An automated rack hooked up to a colossal storage of Squad Smart Gun standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessSmartPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSmartGunOperator
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleRiflemanApparel
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: CMBeltSmartGunOperatorFilled
      - id: RMCBeltSmartGunOperatorPistolFilled
    - name: Подсумки # CCM14
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchFlareFilled
        name: подсумок для фальшфейеров (Полный) # CCM14
      - id: RMCPouchElectronics
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинт, мазь) # CCM14 # TODO RMC14 splints comma
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
        recommended: true
      - id: RMCPouchMagazinePistolLarge
        recommended: true
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchGeneralMedium
      - id: RMCPouchPistol
      - id: RMCPouchMacheteFilled
        name: ножны H6B для мачете M2132 (Заполненные) # CCM14
      - id: RMCPouchSling
    - name: Аксессуары # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
    - name: Маски # CCM14
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather
