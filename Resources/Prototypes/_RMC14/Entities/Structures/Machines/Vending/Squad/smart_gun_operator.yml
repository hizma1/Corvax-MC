        points: 20
      - id: RMCBoxClaymoreMineFilled
        points: 20
    - name: Вторичные боеприпасы # CCM14
      entries:
      - id: RMCMagazinePistolM13Ext
        points: 6
      # - id: RMCSpeedLoader44Heavy
      #  points: 10
      - id: RMCSpeedLoader44Marksman
        points: 10
      - id: RMCMagazinePistolM1984HP
        points: 5
      - id: RMCMagazinePistolM1984AP
