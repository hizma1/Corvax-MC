- type: entity
  parent: ColMarTechBase
  id: ColMarTechFLEquipment
  name: ColMarTech fireteam leader equipment rack
  description: An automated rack hooked up to a colossal storage of fireteam leader standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessFTLPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMFireteamLeader
    sections:
    - name: Стандартное снаряжение # CCM14
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleFireteamLeaderApparel
      - id: RMCBackpackRTO
        replaceSlot: back
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
      - id: RMCVendorBundleCrewFireteamLeader
    - name: Перчатки # CCM14
      choices: { CMHands: 1 }
      entries:
      - id: CMHandsInsulated
      - id: CMHandsBlackInsulated
    - name: Броня # CCM14
      choices: { CMArmor: 1 }
      entries:
      - id: CMArmorM4
        recommended: true
      - id: RMCArmorVestSquad
    - name: Пояса # CCM14
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltMarine
        recommended: true
      - id: RMCBeltHolsterPistol
      - id: RMCBeltHolsterM13
      - id: RMCBeltHolsterRevolver
      - id: RMCBeltHolsterSMG
      - id: RMCBeltHolsterSMGPouch
      - id: RMCM82FHolster
      - id: RMCM276ShotgunShellLoadingRig
      - id: CMBeltUtilityFilled
        name: пояс для инструментов M276 (Заполненный) # CCM14
        recommended: true
      - id: RMCBeltGrenade
    - name: Подсумки # CCM14
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (инъекторы) # CCM14
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (бинты, мазь) # CCM14
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки) # CCM14
      - id: RMCPouchFirstResponder
      - id: RMCPouchFlareFilled
        name: подсумок для фальшфейеров (Заполненный) # CCM14
      - id: RMCPouchFuelTank
      - id: RMCPouchGeneralLarge
      - id: RMCPouchSling
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchPistol
      - id: RMCPouchToolsFill
        recommended: true
        name: подсумок для инструментов (Полный) # CCM14
    - name: Аксессуары # CCM14
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
      - id: CMWebbingHolster
      - id: RMCWebbingHolsterBlack
