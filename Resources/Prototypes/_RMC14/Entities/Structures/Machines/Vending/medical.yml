- type: entity
  parent: ColMarTechBaseAnchorable
  id: CMVendorBlood
  name: MM Blood Dispenser
  description: The Marine Med Brand Blood Pack Dispensary is the premier, top-of-the-line blood dispenser of 2105! Get yours today! #dont update year, that`s a joke from cm13
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/blood.rsi
    snapCardinals: true
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "normal-unshaded"
      map: [ "enum.VendingMachineVisualLayers.BaseUnshaded" ]
      shader: unshaded
    - state: "panel"
      visible: false
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: ApcPowerReceiver
    needsPower: false # TODO RMC14
    powerLoad: 0
  - type: AccessReader
    access:
    - [ "CMAccessMedical" ]
  - type: CMAutomatedVendor
    hackable: true
    sections:
    - name: Blood Packs
      entries:
      - id: CMBloodPackFull
        amount: 30 # 6 blood types, 5 each
    - name: Разное # CCM14
      entries:
      - id: CMBloodPack
        amount: 5
        name: пустой пакет крови # CCM14
