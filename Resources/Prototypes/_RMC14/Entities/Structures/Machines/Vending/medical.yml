- type: entity
  parent: ColMarTechBaseAnchorable
  id: ColMarTechMarineMedical
  name: ColMarTech MarineMed
  description: Medical Pharmaceutical dispenser with basic medical supplies for marines.
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.38,-0.5,0.35,0.5"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/marine_medical.rsi
    layers:
    - state: "off"
      map: [ "enum.VendingMachineVisualLayers.Base" ]
    - state: "normal"
      map: [ "enum.VendingMachineVisualLayers.BaseUnshaded" ]
  - type: CMSolutionRefiller
    current: 600
    max: 600
    recharge: 125 # TODO RMC14 auto-restock items as well if round is >= 20 minutes in
    rechargeCooldown: 4
    reagents:
    - CMTricordrazine
# CMU ADD
    - CMUTramadol
    - CMUParacetamol
# CMU END
    whitelist:
      components:
      - Hypospray
  - type: CMAutomatedVendor
    sections:
    - name: Автоинъекторы # CCM14
      entries:
      - id: CMTricordrazineAutoInjectorNoSkill
        amount: 5
      - id: CCMTramadolAutoInjector #CMU-CCM ADD
        amount: 5
    - name: Мединструменты # CCM14
      entries:
      - id: CMHealthAnalyzer
        amount: 3
    - name: Полевые медикаменты # CCM14
      entries:
      - id: CMFireExtinguisherPortable
        amount: 5
      - id: CMOintment10
        amount: 8
      - id: CMGauze10
        amount: 8
# CMU ADD
      - id: CMUSplintItem
        amount: 5
# CMU END

- type: entity
  parent: ColMarTechMarineMedical
  id: ColMarTechMarineMedicalPowered
  suffix: Powered
  components:
  - type: ApcPowerReceiver
    powerLoad: 0
    needsPower: false # intentionally!
  - type: CMAutomatedVendor
    ejectContentsOnDestruction: true # Players should not be afraid that everything they put into vending machines for storage will disappear when the tent is destroyed

