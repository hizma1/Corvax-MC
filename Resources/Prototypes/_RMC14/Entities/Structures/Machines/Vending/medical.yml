# MEDICAL

- type: entity
  id: CMMedilinkSupplyPort
  name: medilink supply port
  description: A complex network of pipes and machinery, linking to large storage systems below the deck. Medical vendors linked to this port will be able to infinitely restock supplies.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/Machines/Medical/medilink.rsi
    state: medlink_green_clamped # TODO RMC14 change states dynamically
    drawdepth: FloorObjects
  - type: CMMedicalSupplyLink
  - type: RMCMesonsNonviewable

- type: entity
  parent: ColMarTechBaseAnchorable
  id: CMVendorMedicalAllAccess
  name: We-Ya-Med Plus
  description: Medical pharmaceutical dispenser. Provided by We-Ya Pharmaceuticals Division(TM).
  suffix: All Access
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/med.rsi
    layers:
    - state: "off"
    - state: "normal-unshaded"
  - type: CMSolutionRefiller
    randomizeReagentsPlanetside: true
    current: 600
    max: 600
    recharge: 125 # TODO RMC14 auto-restock items as well if round is >= 20 minutes in
    rechargeCooldown: 4
    reagents:
    - CMBicaridine
    - CMKelotane
    - CMDylovene
    - CMDexalin
    - CMDexalinPlus
    - CMTricordrazine
    - CMEpinephrine
    - CMInaprovaline
# CMU ADD
    - CMUTramadol
    - CMUParacetamol
    - CMUOxycodone
    - CMUHepatocytin
    - CMUPulmovine
    - CMUNephronate
    - CMUCardiocaine
    - CMUOsteoCalc
# CMU END
    whitelist:
      components:
      - Hypospray
      - Vial
      tags:
      - Bottle
  - type: CMAutomatedVendor # TODO RMC14 different ui style
    hackable: true
    randomUnstockAmount: -1 # -1 is between 1 and the original amount
    randomEmptyChance: 0.25 # 25% chance
    sections:
    - name: Полевые медикаменты # CCM14
      entries:
      - id: CMBurnKit10
        amount: 10
      - id: CMTraumaKit10
        amount: 10
      - id: CMOintment10
        amount: 10
      - id: CMGauze10
        amount: 10
# CMU ADD
      - id: CMUSplintItem
        amount: 5
# CMU END
    - name: Автоинъекторы # CCM14
      entries:
      - id: CMBicaridineAutoInjector
        amount: 5
      - id: CMDexalinPlusAutoInjector
        amount: 5
      - id: RMCDyloveneAutoInjector
        amount: 5
      - id: CMEpinephrineAutoInjector
        amount: 5
      - id: CMInaprovalineAutoInjector
        amount: 5
      - id: CMKelotaneAutoInjector
        amount: 3
# CMU-CCM ADD
      - id: CCMDoxarubixadoneAutoInjector # CCM-14
        amount: 5
      - id: CCMTramadolAutoInjector
        amount: 5
      - id: CCMParacetamolAutoInjector
        amount: 5
      - id: CCMOxycodoneAutoInjector
        amount: 3
      - id: CCMOrganMixAutoInjector
        amount: 5
# CMU-CCM END
      - id: CMTricordrazineAutoInjector
        amount: 5
    - name: Растворы # CCM14
      entries:
      - id: CMBottleBicaridine
        amount: 3
      - id: CMBottleDylovene
        amount: 3
      - id: CMBottleDexalin
        amount: 3
      - id: CMBottleInaprovaline
        amount: 3
      - id: CMBottleKelotane
        amount: 3
# CMU-CCM ADD
      - id: CMULimbPrinterMatrixBeaker
        amount: 3
      - id: CCMBottleTramadol
        amount: 3
      - id: CCMBottleParacetamol
        amount: 3
      - id: CCMBottleOxycodone
        amount: 2
      - id: CCMBottleOrganMix
        amount: 2
# CMU-CCM END
    - name: Таблетки # CCM14
      entries:
      - id: CMPillCanisterBicaridine
        amount: 4
      - id: CMPillCanisterDexalin
        amount: 4
      - id: CMPillCanisterDylovene
        amount: 4
      - id: CMPillCanisterInaprovaline
        amount: 4
      - id: CMPillCanisterKelotane
        amount: 4
# CMU-CCM ADD
      - id: CCMPillCanisterTramadol
        amount: 3
      - id: CCMPillCanisterOxycodone
        amount: 2
      - id: CCMPillCanisterParacetamolNoSkill
        amount: 2
      - id: CCMPillCanisterOrgansMix
        amount: 3
# CMU-CCM EMD
    - name: Мединструменты # CCM14
      entries:
      - id: CMDefibrillator
        amount: 3
      - id: CMSurgicalLine
        amount: 2
      - id: CMSynthGraft
        amount: 2
      - id: CMHyposprayWithVial
        amount: 3
      - id: RMCVialTricordrazine
        amount: 3
      - id: CMHealthAnalyzer
        amount: 5
      - id: CMBeltMedical
        amount: 2
      - id: RMCGlassesMedicalHUDGlasses
        amount: 3
      - id: CMStasisBagFolded
        amount: 3
      - id: CMSyringe
        amount: 7
# CMU ADD
      - id: CMUBoneGraftItem
        amount: 3
      - id: CMUCastItem
        amount: 3
      - id: CMUOrganClampItem
        amount: 3
# CMU END

