    map: /Maps/_RMC14/lv624.yml
    camouflage: Jungle
    announcement: "Пехота! Археолого-исследовательский центр на планете под названием LV-624, или как там её называют жители... не важно. В любом случае, оттуда был отправлен сигнал бедствия. Мы его приняли, и теперь на наших плечах лежит задача разобраться с тем, что там случилось. По стандарту: готовьтесь к встрече с ксеноморфами.
