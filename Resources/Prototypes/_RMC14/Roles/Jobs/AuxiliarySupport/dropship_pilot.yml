- type: job
  parent: RMCJobMarineBase
  id: CMPilotDropship
  name: cm-job-name-dropship-pilot
  description: cm-job-description-dropship-pilot
  playTimeTracker: CMJobPilotDropship
  requirements:
# CCM14 role timers [remove/start]
#  - !type:TotalJobsTimeRequirement
#    group: CMJobsDropship
#    time: 7200 # 2 hours
# CCM14 role timers [remove/end] [add/start]
  - !type:DepartmentTimeRequirement
    department: CMSquad
    time: 10800 # 3 hours
  - !type:RoleTimeRequirement
    role: CMJobDropshipCrewChief
    time: 18000 # 5 hours
# CCM14 role timers [add/end]
  ranks:
    RMCRankNavyEnsign: #CCM14
    - !type:RoleTimeRequirement
      role: CMJobPilotDropship
      time: 252000 # 70 hours
    RMCRankNavyCommandMasterChiefPettyOfficer: #CCM14
    - !type:RoleTimeRequirement
      role: CMJobPilotDropship
      time: 90000 # 25 hours
    RMCRankNavyMasterChiefPettyOfficer: [] #CCM14
  startingGear: CMGearPilotDropship
  icon: "CMJobIconPilotDropship"
  joinNotifyCrew: false
  marineAuthorityLevel: 7
  supervisors: cm-job-supervisors-aso
  accessGroups:
  - Pilot
  roleWeight: 0.25
  special:
  - !type:AddComponentSpecial
    components:
    - type: TacticalMapUser
      actionId: RMCActionOpenTacticalMapMarine
      layerSets: [TacticalMapSetMarine]
    - type: TacticalMapLayerTracked
      layers: [Marines]
    - type: Skills
      skills:
        RMCSkillEndurance: 1
        RMCSkillFirearms: 1
        RMCSkillFireman: 1
        RMCSkillIntel: 1
        RMCSkillJtac: 2
        RMCSkillLeadership: 1
        RMCSkillMedical: 2
        RMCSkillOverwatch: 1
        RMCSkillPilot: 2
        RMCSkillPowerLoader: 2
        RMCSkillSurgery: 1
    - type: MarineOrders
    - type: CMVendorUser
      id: CMPilotDropship
      points: 45
    - type: RMCPointing
    - type: JobPrefix
      prefix: cm-job-prefix-dropship-pilot
    - type: ViewIntelObjectives
    - type: TacticalMapIcon
      icon:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: pilot
      background:
        sprite: /Textures/_RMC14/Interface/map_blips.rsi
        state: background_command
    - type: MutinyEligible

- type: startingGear
  id: CMGearPilotDropship
  equipment:
    jumpsuit: CMJumpsuitPilot
    shoes: CMBootsBlackFilled
    id: CMIDCardPilotDropship
    ears: CMHeadsetPilot

- type: entity
  parent: CMSpawnPointJobBase
  id: CMSpawnPointPilotDropship
  name: dropship pilot spawn point
  components:
  - type: SpawnPoint
    job_id: CMPilotDropship
  - type: Sprite
    state: po_spawn

- type: playTimeTracker
  id: CMJobPilotDropship
  isHumanoid: true
